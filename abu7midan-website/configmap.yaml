apiVersion: v1
kind: ConfigMap
metadata:
  name: portfolio-html
  namespace: abu7midan-website
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>ABU7MIDAN // CLASSIFIED DOSSIER</title>
        <style>
            :root {
                --primary: #00ff9d;
                --secondary: #00b8ff;
                --background: #000814;
                --surface: #001d3d;
                --text: #e0e0e0;
                --text-secondary: #8a8a8a;
                --accent: #ff0055;
                --terminal: #00ff9d;
                --classified: #ffd700;
                --glitch1: #00ff9d;
                --glitch2: #ff0055;
                --glitch3: #00b8ff;
            }
            
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            
            body {
                font-family: 'SF Mono', 'Monaco', 'Inconsolata', monospace;
                background-color: var(--background);
                color: var(--text);
                line-height: 1.6;
                padding: 20px;
                max-width: 1400px;
                margin: 0 auto;
                overflow-x: hidden;
                background-image: 
                    radial-gradient(circle at 10% 20%, rgba(0, 255, 157, 0.05) 0%, transparent 20%),
                    radial-gradient(circle at 90% 80%, rgba(0, 184, 255, 0.05) 0%, transparent 20%),
                    linear-gradient(to bottom, transparent, rgba(0, 29, 61, 0.3));
            }
        </style>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    </head>
    <body>
        <div class="matrix-background"></div>
        
        <div class="classified-banner">
            TOP SECRET // EYES ONLY // CLEARANCE LEVEL: OMEGA
        </div>

        <div class="command-line">
            <span style="color: var(--primary);">Initializing secure connection...</span><br>
            <span style="color: var(--secondary);">Establishing encrypted channel...</span><br>
            <span style="color: var(--primary);">Connection established. Welcome, Director.</span><br>
            <span style="color: var(--terminal);">Accessing dossier: ABU7MIDAN_PROFILE</span>
            <span class="blinking-cursor"></span>
        </div>

        <header>
            <div class="id-badge">
                <h1 class="glitch" data-text="MOHAMMAD ABU HUMAIDAN">MOHAMMAD ABU HUMAIDAN</h1>
                <div class="codename">OPERATIVE: "ARCHITECT"</div>
                <div class="clearance-level">CLEARANCE: OMEGA LEVEL</div>
                <p>
                    <i class="fas fa-terminal"></i> Integration Architect | Cloud Architect | APIGEE | WSO2 | KONG | .NET |
                    KUBERNETES | DEVOPS | SRE | EVENT-DRIVEN SYSTEMS
                </p>
            </div>
        </header>
    </body>
    </html>
