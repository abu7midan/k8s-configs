        <script>
            document.addEventListener('DOMContentLoaded', function() {
                // Typewriter effect for command line
                const lines = [
                    "Initializing secure connection...",
                    "Establishing encrypted channel...",
                    "Connection established. Welcome, Director.",
                    "Accessing dossier: ABU7MIDAN_PROFILE",
                    "Decryption complete. Profile ready for review."
                ];
                
                const commandLine = document.querySelector('.command-line');
                let lineIndex = 0;
                let charIndex = 0;
                let currentLine = '';
                
                function typeWriter() {
                    if (lineIndex < lines.length) {
                        if (charIndex < lines[lineIndex].length) {
                            currentLine += lines[lineIndex].charAt(charIndex);
                            commandLine.innerHTML = currentLine + '<span class="blinking-cursor"></span>';
                            charIndex++;
                            setTimeout(typeWriter, 50);
                        } else {
                            currentLine += '<br>';
                            lineIndex++;
                            charIndex = 0;
                            setTimeout(typeWriter, 500);
                        }
                    }
                }
                
                setTimeout(typeWriter, 1000);
                
                // Smooth scrolling
                document.querySelectorAll('.nav-button[href^="#"]').forEach(anchor => {
                    anchor.addEventListener('click', function(e) {
                        if(this.getAttribute('href') !== '#monitoring') {
                            e.preventDefault();
                            const targetId = this.getAttribute('href');
                            const targetElement = document.querySelector(targetId);
                            if(targetElement) {
                                targetElement.scrollIntoView({
                                    behavior: 'smooth',
                                    block: 'start'
                                });
                            }
                        }
                    });
                });
                
                // Matrix background effect
                const matrix = document.querySelector('.matrix-background');
                let angle = 0;
                setInterval(() => {
                    angle = (angle + 0.5) % 360;
                    matrix.style.background = `repeating-linear-gradient(
                        ${angle}deg,
                        transparent,
                        transparent 2px,
                        var(--primary) 2px,
                        var(--primary) 4px
                    )`;
                }, 50);
                
                // Status terminal updates
                const statusLines = document.querySelectorAll('.status-line');
                statusLines.forEach((line, index) => {
                    setTimeout(() => {
                        line.style.opacity = '0';
                        setTimeout(() => {
                            line.style.opacity = '1';
                            line.style.transition = 'opacity 0.5s';
                        }, 100);
                    }, index * 3000);
                });
                
                // Add glitch effects randomly
                setInterval(() => {
                    const elements = document.querySelectorAll('.glitch, .nav-button, h2');
                    const randomElement = elements[Math.floor(Math.random() * elements.length)];
                    randomElement.style.animation = 'none';
                    setTimeout(() => {
                        randomElement.style.animation = '';
                    }, 100);
                }, 3000);
            });
        </script>
