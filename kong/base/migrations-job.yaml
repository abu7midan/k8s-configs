apiVersion: batch/v1
kind: Job
metadata:
  name: kong-migrations
  namespace: kong
spec:
  template:
    spec:
      containers:
      - name: kong-migrations
        image: kong/kong-gateway:3.13.0.1
        env:
        - name: KONG_PG_HOST
          value: kong-postgresql
        - name: KONG_PG_DATABASE
          value: kong
        - name: KONG_PG_USER
          value: kong
        - name: KONG_PG_PASSWORD
          value: kongpass
        command:
        - /bin/sh
        - -c
        - |
          kong migrations bootstrap
      restartPolicy: Never
  backoffLimit: 3
