        {"apiVersion":"v1","data":{"index.html":"\u003c!DOCTYPE html\u003e\n\u003chtml lang=\"en\"\u003e\n\u003chead\u003e\n    \u003cmeta charset=\"UTF-8\"\u003e\n    \u003cmeta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\"\u003e\n    \u003ctitle\u003eABU7MIDAN // CLASSIFIED DOSSIER\u003c/title\u003e\n    \u003cstyle\u003e\n        :root {\n            --primary: #00ff9d;\n            --secondary: #00b8ff;\n            --background: #000814;\n            --surface: #001d3d;\n            --text: #e0e0e0;\n            --text-secondary: #8a8a8a;\n            --accent: #ff0055;\n            --terminal: #00ff9d;\n            --classified: #ffd700;\n            --glitch1: #00ff9d;\n            --glitch2: #ff0055;\n            --glitch3: #00b8ff;\n        }\n        \n        * {\n            margin: 0;\n            padding: 0;\n            box-sizing: border-box;\n        }\n        \n        body {\n            font-family: 'SF Mono', 'Monaco', 'Inconsolata', monospace;\n            background-color: var(--background);\n            color: var(--text);\n            line-height: 1.6;\n            padding: 20px;\n            max-width: 1400px;\n            margin: 0 auto;\n            overflow-x: hidden;\n            background-image: \n                radial-gradient(circle at 10% 20%, rgba(0, 255, 157, 0.05) 0%, transparent 20%),\n                radial-gradient(circle at 90% 80%, rgba(0, 184, 255, 0.05) 0%, transparent 20%),\n                linear-gradient(to bottom, transparent, rgba(0, 29, 61, 0.3));\n        }\n        \n        .classified-banner {\n            background: linear-gradient(90deg, #ffd700, #ffed4e, #ffd700);\n            color: #000;\n            text-align: center;\n            padding: 8px;\n            font-size: 14px;\n            font-weight: bold;\n            letter-spacing: 2px;\n            text-transform: uppercase;\n            border-bottom: 2px solid var(--accent);\n            animation: banner-glitch 10s infinite;\n            position: relative;\n            overflow: hidden;\n        }\n        \n        @keyframes banner-glitch {\n            0%, 100% { transform: translateX(0); }\n            95% { transform: translateX(0); }\n            96% { transform: translateX(-5px); }\n            97% { transform: translateX(5px); }\n            98% { transform: translateX(0); }\n        }\n        \n        .classified-banner::before {\n            content: \"⚠️ TOP SECRET // EYES ONLY ⚠️\";\n            position: absolute;\n            top: 0;\n            left: -100%;\n            width: 100%;\n            height: 100%;\n            background: inherit;\n            animation: scanner 20s linear infinite;\n        }\n        \n        @keyframes scanner {\n            0% { left: -100%; }\n            100% { left: 100%; }\n        }\n        \n        .matrix-background {\n            position: fixed;\n            top: 0;\n            left: 0;\n            width: 100%;\n            height: 100%;\n            pointer-events: none;\n            opacity: 0.03;\n            z-index: -1;\n            background: repeating-linear-gradient(\n                0deg,\n                transparent,\n                transparent 2px,\n                var(--primary) 2px,\n                var(--primary) 4px\n            );\n            animation: matrix-scroll 20s linear infinite;\n        }\n        \n        @keyframes matrix-scroll {\n            0% { background-position: 0 0; }\n            100% { background-position: 0 1000px; }\n        }\n        \n        .command-line {\n            background: rgba(0, 29, 61, 0.8);\n            border: 1px solid var(--primary);\n            border-radius: 0;\n            padding: 25px;\n            margin: 30px 0;\n            position: relative;\n            font-family: 'SF Mono', monospace;\n            backdrop-filter: blur(5px);\n            box-shadow: 0 0 30px rgba(0, 255, 157, 0.1);\n        }\n        \n        .command-line::before {\n            content: \"root@secure-enclave:~#\";\n            position: absolute;\n            top: -12px;\n            left: 20px;\n            background: var(--surface);\n            padding: 0 15px;\n            font-size: 13px;\n            color: var(--primary);\n            letter-spacing: 1px;\n            border: 1px solid var(--primary);\n            border-bottom: none;\n        }\n        \n        .blinking-cursor {\n            display: inline-block;\n            width: 8px;\n            height: 20px;\n            background: var(--primary);\n            margin-left: 5px;\n            animation: blink 1s infinite;\n            vertical-align: middle;\n        }\n        \n        @keyframes blink {\n            0%, 50% { opacity: 1; }\n            51%, 100% { opacity: 0; }\n        }\n        \n        header {\n            text-align: center;\n            padding: 60px 20px;\n            margin-bottom: 50px;\n            position: relative;\n            overflow: hidden;\n        }\n        \n        .id-badge {\n            display: inline-block;\n            padding: 30px;\n            background: linear-gradient(135deg, rgba(0, 29, 61, 0.9), rgba(0, 56, 107, 0.9));\n            border: 2px solid var(--primary);\n            border-radius: 10px;\n            position: relative;\n            box-shadow: 0 0 50px rgba(0, 255, 157, 0.2);\n            animation: badge-glow 3s ease-in-out infinite;\n        }\n        \n        @keyframes badge-glow {\n            0%, 100% { box-shadow: 0 0 50px rgba(0, 255, 157, 0.2); }\n            50% { box-shadow: 0 0 70px rgba(0, 255, 157, 0.4); }\n        }\n        \n        .id-badge::before {\n            content: \"\";\n            position: absolute;\n            top: -2px;\n            left: -2px;\n            right: -2px;\n            bottom: -2px;\n            background: linear-gradient(45deg, var(--glitch1), var(--glitch2), var(--glitch3), var(--glitch1));\n            z-index: -1;\n            border-radius: 12px;\n            animation: border-rotate 4s linear infinite;\n        }\n        \n        @keyframes border-rotate {\n            0% { filter: hue-rotate(0deg); }\n            100% { filter: hue-rotate(360deg); }\n        }\n        \n        h1 {\n            color: var(--primary);\n            font-size: 2.8em;\n            margin-bottom: 10px;\n            text-transform: uppercase;\n            letter-spacing: 3px;\n            position: relative;\n            display: inline-block;\n        }\n        \n        h1::after {\n            content: \"\";\n            position: absolute;\n            bottom: -10px;\n            left: 25%;\n            width: 50%;\n            height: 3px;\n            background: linear-gradient(90deg, transparent, var(--primary), transparent);\n        }\n        \n        .codename {\n            color: var(--classified);\n            font-size: 1.2em;\n            margin-bottom: 20px;\n            text-transform: uppercase;\n            letter-spacing: 2px;\n            animation: codename-flicker 5s infinite;\n        }\n        \n        @keyframes codename-flicker {\n            0%, 100% { opacity: 1; }\n            50% { opacity: 0.7; }\n            51% { opacity: 1; }\n        }\n        \n        .clearance-level {\n            display: inline-block;\n            padding: 8px 20px;\n            background: linear-gradient(90deg, #8b0000, #ff0000);\n            color: white;\n            font-size: 12px;\n            font-weight: bold;\n            letter-spacing: 1px;\n            border-radius: 3px;\n            margin-top: 15px;\n            animation: clearance-pulse 2s infinite;\n        }\n        \n        @keyframes clearance-pulse {\n            0%, 100% { transform: scale(1); }\n            50% { transform: scale(1.05); }\n        }\n        \n        .contact-grid {\n            display: grid;\n            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));\n            gap: 20px;\n            margin: 40px 0;\n            padding: 30px;\n            background: rgba(0, 29, 61, 0.6);\n            border: 1px solid rgba(0, 255, 157, 0.2);\n            border-radius: 5px;\n        }\n        \n        .contact-node {\n            text-align: center;\n            padding: 20px;\n            background: rgba(0, 40, 85, 0.4);\n            border: 1px solid rgba(0, 184, 255, 0.3);\n            border-radius: 5px;\n            transition: all 0.3s ease;\n            position: relative;\n            overflow: hidden;\n        }\n        \n        .contact-node:hover {\n            transform: translateY(-5px);\n            border-color: var(--primary);\n            box-shadow: 0 10px 20px rgba(0, 255, 157, 0.1);\n            background: rgba(0, 40, 85, 0.6);\n        }\n        \n        .contact-node::before {\n            content: \"\";\n            position: absolute;\n            top: 0;\n            left: -100%;\n            width: 100%;\n            height: 100%;\n            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);\n            transition: left 0.5s;\n        }\n        \n        .contact-node:hover::before {\n            left: 100%;\n        }\n        \n        .contact-icon {\n            font-size: 2em;\n            margin-bottom: 10px;\n            color: var(--primary);\n        }\n        \n        .contact-node a {\n            color: var(--text);\n            text-decoration: none;\n            display: block;\n            margin-top: 10px;\n            font-size: 0.9em;\n            color: var(--secondary);\n            transition: color 0.3s;\n        }\n        \n        .contact-node a:hover {\n            color: var(--primary);\n            text-decoration: underline;\n        }\n        \n        .nav-terminal {\n            display: grid;\n            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));\n            gap: 15px;\n            margin: 40px 0;\n            padding: 25px;\n            background: rgba(0, 29, 61, 0.8);\n            border: 1px solid var(--primary);\n            border-radius: 0;\n            position: relative;\n        }\n        \n        .nav-terminal::before {\n            content: \"ACCESS TERMINAL\";\n            position: absolute;\n            top: -12px;\n            left: 20px;\n            background: var(--surface);\n            padding: 0 15px;\n            font-size: 12px;\n            color: var(--primary);\n            letter-spacing: 1px;\n        }\n        \n        .nav-button {\n            padding: 15px;\n            background: linear-gradient(135deg, rgba(0, 40, 85, 0.8), rgba(0, 20, 40, 0.8));\n            border: 1px solid rgba(0, 184, 255, 0.3);\n            color: var(--text);\n            text-decoration: none;\n            text-align: center;\n            font-size: 14px;\n            letter-spacing: 1px;\n            transition: all 0.3s;\n            position: relative;\n            overflow: hidden;\n            display: flex;\n            align-items: center;\n            justify-content: center;\n            gap: 10px;\n        }\n        \n        .nav-button::before {\n            content: \"\u003e\";\n            color: var(--primary);\n            font-weight: bold;\n        }\n        \n        .nav-button:hover {\n            background: linear-gradient(135deg, rgba(0, 255, 157, 0.2), rgba(0, 184, 255, 0.2));\n            border-color: var(--primary);\n            transform: translateY(-3px);\n            box-shadow: 0 5px 15px rgba(0, 255, 157, 0.2);\n        }\n        \n        .nav-button.critical {\n            border-color: var(--accent);\n            background: linear-gradient(135deg, rgba(255, 0, 85, 0.1), rgba(139, 0, 0, 0.1));\n        }\n        \n        .nav-button.critical:hover {\n            background: linear-gradient(135deg, rgba(255, 0, 85, 0.3), rgba(139, 0, 0, 0.3));\n            box-shadow: 0 5px 15px rgba(255, 0, 85, 0.2);\n        }\n        \n        .nav-button.warning {\n            border-color: var(--classified);\n            background: linear-gradient(135deg, rgba(255, 215, 0, 0.1), rgba(139, 101, 8, 0.1));\n        }\n        \n        .nav-button.warning:hover {\n            background: linear-gradient(135deg, rgba(255, 215, 0, 0.3), rgba(139, 101, 8, 0.3));\n            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.2);\n        }\n        \n        .intel-section {\n            margin: 50px 0;\n            padding: 30px;\n            background: rgba(0, 29, 61, 0.6);\n            border: 1px solid rgba(0, 184, 255, 0.2);\n            border-radius: 5px;\n            position: relative;\n            overflow: hidden;\n        }\n        \n        .intel-section::before {\n            content: attr(data-section);\n            position: absolute;\n            top: -12px;\n            left: 20px;\n            background: var(--surface);\n            padding: 0 15px;\n            font-size: 14px;\n            color: var(--primary);\n            letter-spacing: 1px;\n            text-transform: uppercase;\n        }\n        \n        .intel-section h2 {\n            color: var(--secondary);\n            font-size: 1.8em;\n            margin-bottom: 25px;\n            padding-bottom: 10px;\n            border-bottom: 2px solid rgba(0, 184, 255, 0.3);\n            text-transform: uppercase;\n            letter-spacing: 2px;\n        }\n        \n        .skill-matrix {\n            display: grid;\n            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));\n            gap: 25px;\n            margin-top: 20px;\n        }\n        \n        .skill-category {\n            padding: 25px;\n            background: rgba(0, 40, 85, 0.4);\n            border: 1px solid rgba(0, 184, 255, 0.2);\n            border-radius: 5px;\n            transition: all 0.3s;\n            position: relative;\n        }\n        \n        .skill-category:hover {\n            border-color: var(--primary);\n            transform: translateY(-5px);\n            box-shadow: 0 10px 20px rgba(0, 255, 157, 0.1);\n        }\n        \n        .skill-category h3 {\n            color: var(--primary);\n            margin-bottom: 15px;\n            font-size: 1.3em;\n            text-transform: uppercase;\n            letter-spacing: 1px;\n            display: flex;\n            align-items: center;\n            gap: 10px;\n        }\n        \n        .skill-category h3::before {\n            content: \"▸\";\n            color: var(--accent);\n        }\n        \n        .skill-list {\n            list-style-type: none;\n        }\n        \n        .skill-list li {\n            padding: 8px 0;\n            color: var(--text-secondary);\n            position: relative;\n            padding-left: 25px;\n            border-bottom: 1px solid rgba(255, 255, 255, 0.05);\n            transition: all 0.3s;\n        }\n        \n        .skill-list li:hover {\n            color: var(--text);\n            background: rgba(255, 255, 255, 0.03);\n            padding-left: 30px;\n        }\n        \n        .skill-list li::before {\n            content: \"✓\";\n            position: absolute;\n            left: 0;\n            color: var(--primary);\n            font-weight: bold;\n        }\n        \n        .experience-log {\n            margin: 25px 0;\n            padding: 20px;\n            background: rgba(0, 40, 85, 0.3);\n            border-left: 4px solid var(--primary);\n            position: relative;\n            transition: all 0.3s;\n        }\n        \n        .experience-log:hover {\n            background: rgba(0, 40, 85, 0.5);\n            transform: translateX(5px);\n        }\n        \n        .log-header {\n            display: flex;\n            justify-content: space-between;\n            align-items: center;\n            margin-bottom: 10px;\n            flex-wrap: wrap;\n            gap: 10px;\n        }\n        \n        .log-title {\n            color: var(--primary);\n            font-size: 1.2em;\n            font-weight: bold;\n        }\n        \n        .log-agency {\n            color: var(--accent);\n            font-style: italic;\n        }\n        \n        .log-duration {\n            color: var(--classified);\n            font-size: 0.9em;\n            background: rgba(255, 215, 0, 0.1);\n            padding: 3px 10px;\n            border-radius: 3px;\n        }\n        \n        .project-grid {\n            display: grid;\n            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));\n            gap: 25px;\n            margin-top: 20px;\n        }\n        \n        .project-card {\n            padding: 25px;\n            background: linear-gradient(135deg, rgba(0, 40, 85, 0.4), rgba(0, 20, 40, 0.4));\n            border: 1px solid rgba(0, 184, 255, 0.2);\n            border-radius: 5px;\n            transition: all 0.3s;\n            position: relative;\n            overflow: hidden;\n        }\n        \n        .project-card::before {\n            content: \"\";\n            position: absolute;\n            top: 0;\n            left: 0;\n            right: 0;\n            height: 3px;\n            background: linear-gradient(90deg, var(--glitch1), var(--glitch2), var(--glitch3));\n        }\n        \n        .project-card:hover {\n            transform: translateY(-8px);\n            border-color: var(--primary);\n            box-shadow: 0 15px 30px rgba(0, 255, 157, 0.15);\n        }\n        \n        .project-card h3 {\n            color: var(--primary);\n            margin-bottom: 15px;\n            font-size: 1.3em;\n            text-transform: uppercase;\n            letter-spacing: 1px;\n        }\n        \n        .project-card .codename {\n            display: inline-block;\n            padding: 3px 10px;\n            background: rgba(0, 255, 157, 0.1);\n            color: var(--primary);\n            font-size: 0.8em;\n            border-radius: 3px;\n            margin-bottom: 10px;\n        }\n        \n        .status-terminal {\n            background: rgba(0, 0, 0, 0.8);\n            border: 1px solid var(--primary);\n            padding: 20px;\n            margin: 40px 0;\n            font-family: 'SF Mono', monospace;\n            position: relative;\n        }\n        \n        .status-terminal::before {\n            content: \"SYSTEM STATUS\";\n            position: absolute;\n            top: -12px;\n            left: 20px;\n            background: var(--background);\n            padding: 0 15px;\n            font-size: 12px;\n            color: var(--primary);\n            letter-spacing: 1px;\n        }\n        \n        .status-line {\n            margin: 8px 0;\n            color: var(--terminal);\n            font-size: 14px;\n            display: flex;\n            align-items: center;\n            gap: 10px;\n        }\n        \n        .status-line::before {\n            content: \"\u003e\";\n            color: var(--accent);\n            font-weight: bold;\n        }\n        \n        .status-line.online { color: var(--primary); }\n        .status-line.offline { color: var(--accent); }\n        .status-line.warning { color: var(--classified); }\n        \n        footer {\n            text-align: center;\n            padding: 40px 20px;\n            margin-top: 60px;\n            border-top: 1px solid rgba(0, 184, 255, 0.3);\n            color: var(--text-secondary);\n            font-size: 0.9em;\n            background: rgba(0, 29, 61, 0.4);\n        }\n        \n        .footer-links {\n            display: flex;\n            justify-content: center;\n            gap: 30px;\n            margin-top: 20px;\n            flex-wrap: wrap;\n        }\n        \n        .footer-links a {\n            color: var(--text-secondary);\n            text-decoration: none;\n            transition: color 0.3s;\n            display: flex;\n            align-items: center;\n            gap: 8px;\n        }\n        \n        .footer-links a:hover {\n            color: var(--primary);\n        }\n        \n        @media (max-width: 768px) {\n            h1 { font-size: 2em; }\n            .contact-grid { grid-template-columns: 1fr; }\n            .nav-terminal { grid-template-columns: 1fr; }\n            .skill-matrix { grid-template-columns: 1fr; }\n            .project-grid { grid-template-columns: 1fr; }\n            .log-header { flex-direction: column; align-items: flex-start; }\n        }\n        \n        /* Glitch effects */\n        .glitch {\n            position: relative;\n            animation: glitch-skew 4s infinite linear;\n        }\n        \n        @keyframes glitch-skew {\n            0%, 40%, 44%, 58%, 61%, 65%, 69%, 73%, 100% {\n                transform: skew(0deg);\n            }\n            41% { transform: skew(10deg); }\n            42% { transform: skew(-10deg); }\n            59% { transform: skew(40deg) skew(10deg); }\n            60% { transform: skew(-40deg) skew(-10deg); }\n            63% { transform: skew(10deg); }\n            70% { transform: skew(-50deg); }\n            71% { transform: skew(10deg); }\n        }\n        \n        .glitch::before,\n        .glitch::after {\n            content: attr(data-text);\n            position: absolute;\n            top: 0;\n            left: 0;\n            width: 100%;\n            height: 100%;\n        }\n        \n        .glitch::before {\n            left: 2px;\n            text-shadow: -2px 0 var(--glitch2);\n            clip: rect(44px, 450px, 56px, 0);\n            animation: glitch-anim 5s infinite linear alternate-reverse;\n        }\n        \n        .glitch::after {\n            left: -2px;\n            text-shadow: -2px 0 var(--glitch3);\n            clip: rect(44px, 450px, 56px, 0);\n            animation: glitch-anim2 5s infinite linear alternate-reverse;\n        }\n        \n        @keyframes glitch-anim {\n            0% { clip: rect(42px, 9999px, 44px, 0); }\n            5% { clip: rect(12px, 9999px, 59px, 0); }\n       