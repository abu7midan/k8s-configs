apiVersion: kafka.strimzi.io/v1
kind: Kafka
metadata:
  name: my-kafka
  namespace: kafka
spec:
  entityOperator:
    topicOperator: {}
    userOperator: {}
  kafka:
    config:
      default.replication.factor: 3
      min.insync.replicas: 2
      offsets.topic.replication.factor: 3
      transaction.state.log.min.isr: 2
      transaction.state.log.replication.factor: 3
    listeners:
      - name: plain
        port: 9092
        tls: false
        type: internal
      - configuration:
          brokers:
            - advertisedHost: kafka.abu7midan.com
              broker: 0
            - advertisedHost: kafka.abu7midan.com
              broker: 1
            - advertisedHost: kafka.abu7midan.com
              broker: 2
        name: external
        port: 9094
        tls: false
        type: nodeport
    version: 4.1.1
