apiVersion: v1
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush                     1
        Daemon                    Off
        Log_Level                 info
        Parsers_File              parsers.conf
        storage.path              /tmp/flb-storage
        storage.sync              normal
        storage.checksum          off
        storage.max_chunks_up     256

    # ONLY kong namespace logs
    [INPUT]
        Name                      tail
        Path                      /var/log/containers/*_kong_*.log
        Parser                    cri
        Tag                       kong.*
        Mem_Buf_Limit             256MB
        Skip_Long_Lines           On
        Refresh_Interval          5
        storage.type              filesystem

    [FILTER]
        Name                      kubernetes
        Match                     kong.*
        Kube_URL                  https://kubernetes.default.svc:443
        Kube_CA_File              /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        Kube_Token_File           /var/run/secrets/kubernetes.io/serviceaccount/token
        Merge_Log                 On
        Keep_Log                  On
        K8S-Logging.Parser        On
        K8S-Logging.Exclude       On

    # TEMP: don't grep proxy yet (until we confirm the real container name/file)
    # We'll add it back after we confirm the right container log filename.

    [OUTPUT]
        Name                      es
        Match                     kong.*
        Host                      logging-es-http.observability.svc
        Port                      9200
        TLS                       On
        TLS.Verify                Off
        HTTP_User                 ${ES_USER}
        HTTP_Passwd               ${ES_PASS}
        Logstash_Format           On
        Logstash_Prefix           kong-traffic
        Replace_Dots              On
        Suppress_Type_Name        On
        Trace_Error               On
  parsers.conf: |
    [PARSER]
        Name        cri
        Format      regex
        Regex       ^(?<time>[^ ]+) (?<stream>stdout|stderr) (?<logtag>[^ ]*) (?<log>.*)$
        Time_Key    time
        Time_Format %Y-%m-%dT%H:%M:%S.%L%z
kind: ConfigMap
metadata:
  annotations:
    argocd.argoproj.io/tracking-id: logging:/ConfigMap:logging/fluent-bit-config
