    monitorInterval=30
  metadata.version: "4.1"
  server.config: |-
    ##############################
    ##############################
    # This file is automatically generated by the Strimzi Cluster Operator
    # Any changes to this file will be ignored and overwritten!
    ##############################
    ##############################

    ##########
    # Node ID
    ##########
    node.id=1

    ##########
    # KRaft configuration
    ##########
    process.roles=broker
    controller.listener.names=CONTROLPLANE-9090
    controller.quorum.voters=3@my-kafka-controllers-3.my-kafka-kafka-brokers.kafka.svc.cluster.local:9090

    ##########
    # KRaft metadata log dir configuration
    ##########
    metadata.log.dir=/var/lib/kafka/data/kafka-log1

    ##########
    # Kafka message logs configuration
    ##########
    log.dirs=/var/lib/kafka/data/kafka-log1

    ##########
    # Control Plane listener
    ##########
    listener.name.controlplane-9090.ssl.keystore.certificate.chain=${strimzisecrets:kafka/my-kafka-brokers-1:my-kafka-brokers-1.crt}
    listener.name.controlplane-9090.ssl.keystore.key=${strimzisecrets:kafka/my-kafka-brokers-1:my-kafka-brokers-1.key}
    listener.name.controlplane-9090.ssl.keystore.type=PEM
    listener.name.controlplane-9090.ssl.truststore.certificates=${strimzisecrets:kafka/my-kafka-cluster-ca-cert:*.crt}
    listener.name.controlplane-9090.ssl.truststore.type=PEM
    listener.name.controlplane-9090.ssl.client.auth=required

    ##########
    # Replication listener
    ##########
    listener.name.replication-9091.ssl.keystore.certificate.chain=${strimzisecrets:kafka/my-kafka-brokers-1:my-kafka-brokers-1.crt}
    listener.name.replication-9091.ssl.keystore.key=${strimzisecrets:kafka/my-kafka-brokers-1:my-kafka-brokers-1.key}
    listener.name.replication-9091.ssl.keystore.type=PEM
    listener.name.replication-9091.ssl.truststore.certificates=${strimzisecrets:kafka/my-kafka-cluster-ca-cert:*.crt}
    listener.name.replication-9091.ssl.truststore.type=PEM
    listener.name.replication-9091.ssl.client.auth=required

    ##########
    # Listener configuration: PLAIN-9092
    ##########

    ##########
    # Listener configuration: EXTERNAL-9094
    ##########

    ##########
    # Common listener configuration
    ##########
    listener.security.protocol.map=CONTROLPLANE-9090:SSL,REPLICATION-9091:SSL,PLAIN-9092:PLAINTEXT,EXTERNAL-9094:PLAINTEXT
    listeners=REPLICATION-9091://0.0.0.0:9091,PLAIN-9092://0.0.0.0:9092,EXTERNAL-9094://0.0.0.0:9094
    inter.broker.listener.name=REPLICATION-9091
    advertised.listeners=REPLICATION-9091://my-kafka-brokers-1.my-kafka-kafka-brokers.kafka.svc:9091,PLAIN-9092://my-kafka-brokers-1.my-kafka-kafka-brokers.kafka.svc:9092,EXTERNAL-9094://kafka.abu7midan.com:30539
    sasl.enabled.mechanisms=
    ssl.endpoint.identification.algorithm=HTTPS

    ##########
    # Config providers
    ##########
    # Configuration providers configured by the user and by Strimzi
    config.providers=strimzienv,strimzisecrets,strimzifile,strimzidir
    config.providers.strimzienv.class=org.apache.kafka.common.config.provider.EnvVarConfigProvider
    config.providers.strimzienv.param.allowlist.pattern=.*
    config.providers.strimzisecrets.class=io.strimzi.kafka.KubernetesSecretConfigProvider
    config.providers.strimzifile.class=org.apache.kafka.common.config.provider.FileConfigProvider
    config.providers.strimzifile.param.allowed.paths=/opt/kafka
    config.providers.strimzidir.class=org.apache.kafka.common.config.provider.DirectoryConfigProvider
    config.providers.strimzidir.param.allowed.paths=/opt/kafka

    ##########
    # User provided configuration
    ##########
    min.insync.replicas=2
    default.replication.factor=3
    offsets.topic.replication.factor=3
    transaction.state.log.min.isr=2
    transaction.state.log.replication.factor=3
