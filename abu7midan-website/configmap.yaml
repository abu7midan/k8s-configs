apiVersion: v1
kind: ConfigMap
metadata:
  name: portfolio-html
  namespace: abu7midan-website
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>ABU7MIDAN // CLASSIFIED DOSSIER</title>
        <style>
            :root {
                --primary: #00ff9d;
                --secondary: #00b8ff;
                --background: #000814;
                --surface: #001d3d;
                --text: #e0e0e0;
                --text-secondary: #8a8a8a;
                --accent: #ff0055;
                --terminal: #00ff9d;
                --classified: #ffd700;
                --glitch1: #00ff9d;
                --glitch2: #ff0055;
                --glitch3: #00b8ff;
            }
            
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            
            body {
                font-family: 'SF Mono', 'Monaco', 'Inconsolata', monospace;
                background-color: var(--background);
                color: var(--text);
                line-height: 1.6;
                padding: 20px;
                max-width: 1400px;
                margin: 0 auto;
                overflow-x: hidden;
                background-image: 
                    radial-gradient(circle at 10% 20%, rgba(0, 255, 157, 0.05) 0%, transparent 20%),
                    radial-gradient(circle at 90% 80%, rgba(0, 184, 255, 0.05) 0%, transparent 20%),
                    linear-gradient(to bottom, transparent, rgba(0, 29, 61, 0.3));
            }
            
            .classified-banner {
                background: linear-gradient(90deg, #ffd700, #ffed4e, #ffd700);
                color: #000;
                text-align: center;
                padding: 8px;
                font-size: 14px;
                font-weight: bold;
                letter-spacing: 2px;
                text-transform: uppercase;
                border-bottom: 2px solid var(--accent);
                animation: banner-glitch 10s infinite;
                position: relative;
                overflow: hidden;
            }
            
            @keyframes banner-glitch {
                0%, 100% { transform: translateX(0); }
                95% { transform: translateX(0); }
                96% { transform: translateX(-5px); }
                97% { transform: translateX(5px); }
                98% { transform: translateX(0); }
            }
            
            .classified-banner::before {
                content: "⚠️ TOP SECRET // EYES ONLY ⚠️";
                position: absolute;
                top: 0;
                left: -100%;
                width: 100%;
                height: 100%;
                background: inherit;
                animation: scanner 20s linear infinite;
            }
            
            @keyframes scanner {
                0% { left: -100%; }
                100% { left: 100%; }
            }
            
            .matrix-background {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                pointer-events: none;
                opacity: 0.03;
                z-index: -1;
                background: repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 2px,
                    var(--primary) 2px,
                    var(--primary) 4px
                );
                animation: matrix-scroll 20s linear infinite;
            }
            
            @keyframes matrix-scroll {
                0% { background-position: 0 0; }
                100% { background-position: 0 1000px; }
            }
            
            .command-line {
                background: rgba(0, 29, 61, 0.8);
                border: 1px solid var(--primary);
                border-radius: 0;
                padding: 25px;
                margin: 30px 0;
                position: relative;
                font-family: 'SF Mono', monospace;
                backdrop-filter: blur(5px);
                box-shadow: 0 0 30px rgba(0, 255, 157, 0.1);
            }
            
            .command-line::before {
                content: "root@secure-enclave:~#";
                position: absolute;
                top: -12px;
                left: 20px;
                background: var(--surface);
                padding: 0 15px;
                font-size: 13px;
                color: var(--primary);
                letter-spacing: 1px;
                border: 1px solid var(--primary);
                border-bottom: none;
            }
            
            .blinking-cursor {
                display: inline-block;
                width: 8px;
                height: 20px;
                background: var(--primary);
                margin-left: 5px;
                animation: blink 1s infinite;
                vertical-align: middle;
            }
            
            @keyframes blink {
                0%, 50% { opacity: 1; }
                51%, 100% { opacity: 0; }
            }
            
            header {
                text-align: center;
                padding: 60px 20px;
                margin-bottom: 50px;
                position: relative;
                overflow: hidden;
            }
            
            .id-badge {
                display: inline-block;
                padding: 30px;
                background: linear-gradient(135deg, rgba(0, 29, 61, 0.9), rgba(0, 56, 107, 0.9));
                border: 2px solid var(--primary);
                border-radius: 10px;
                position: relative;
                box-shadow: 0 0 50px rgba(0, 255, 157, 0.2);
                animation: badge-glow 3s ease-in-out infinite;
            }
            
            @keyframes badge-glow {
                0%, 100% { box-shadow: 0 0 50px rgba(0, 255, 157, 0.2); }
                50% { box-shadow: 0 0 70px rgba(0, 255, 157, 0.4); }
            }
            
            .id-badge::before {
                content: "";
                position: absolute;
                top: -2px;
                left: -2px;
                right: -2px;
                bottom: -2px;
                background: linear-gradient(45deg, var(--glitch1), var(--glitch2), var(--glitch3), var(--glitch1));
                z-index: -1;
                border-radius: 12px;
                animation: border-rotate 4s linear infinite;
            }
            
            @keyframes border-rotate {
                0% { filter: hue-rotate(0deg); }
                100% { filter: hue-rotate(360deg); }
            }
            
            h1 {
                color: var(--primary);
                font-size: 2.8em;
                margin-bottom: 10px;
                text-transform: uppercase;
                letter-spacing: 3px;
                position: relative;
                display: inline-block;
            }
            
            h1::after {
                content: "";
                position: absolute;
                bottom: -10px;
                left: 25%;
                width: 50%;
                height: 3px;
                background: linear-gradient(90deg, transparent, var(--primary), transparent);
            }
            
            .codename {
                color: var(--classified);
                font-size: 1.2em;
                margin-bottom: 20px;
                text-transform: uppercase;
                letter-spacing: 2px;
                animation: codename-flicker 5s infinite;
            }
            
            @keyframes codename-flicker {
                0%, 100% { opacity: 1; }
                50% { opacity: 0.7; }
                51% { opacity: 1; }
            }
            
            .clearance-level {
                display: inline-block;
                padding: 8px 20px;
                background: linear-gradient(90deg, #8b0000, #ff0000);
                color: white;
                font-size: 12px;
                font-weight: bold;
                letter-spacing: 1px;
                border-radius: 3px;
                margin-top: 15px;
                animation: clearance-pulse 2s infinite;
            }
            
            @keyframes clearance-pulse {
                0%, 100% { transform: scale(1); }
                50% { transform: scale(1.05); }
            }
            
            .contact-grid {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
                gap: 20px;
                margin: 40px 0;
                padding: 30px;
                background: rgba(0, 29, 61, 0.6);
                border: 1px solid rgba(0, 255, 157, 0.2);
                border-radius: 5px;
            }
            
            .contact-node {
                text-align: center;
                padding: 20px;
                background: rgba(0, 40, 85, 0.4);
                border: 1px solid rgba(0, 184, 255, 0.3);
                border-radius: 5px;
                transition: all 0.3s ease;
                position: relative;
                overflow: hidden;
            }
            
            .contact-node:hover {
                transform: translateY(-5px);
                border-color: var(--primary);
                box-shadow: 0 10px 20px rgba(0, 255, 157, 0.1);
                background: rgba(0, 40, 85, 0.6);
            }
            
            .contact-node::before {
                content: "";
                position: absolute;
                top: 0;
                left: -100%;
                width: 100%;
                height: 100%;
                background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
                transition: left 0.5s;
            }
            
            .contact-node:hover::before {
                left: 100%;
            }
            
            .contact-icon {
                font-size: 2em;
                margin-bottom: 10px;
                color: var(--primary);
            }
            
            .contact-node a {
                color: var(--text);
                text-decoration: none;
                display: block;
                margin-top: 10px;
                font-size: 0.9em;
                color: var(--secondary);
                transition: color 0.3s;
            }
            
            .contact-node a:hover {
                color: var(--primary);
                text-decoration: underline;
            }
            
            .nav-terminal {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
                gap: 15px;
                margin: 40px 0;
                padding: 25px;
                background: rgba(0, 29, 61, 0.8);
                border: 1px solid var(--primary);
                border-radius: 0;
                position: relative;
            }
            
            .nav-terminal::before {
                content: "ACCESS TERMINAL";
                position: absolute;
                top: -12px;
                left: 20px;
                background: var(--surface);
                padding: 0 15px;
                font-size: 12px;
                color: var(--primary);
                letter-spacing: 1px;
            }
            
            .nav-button {
                padding: 15px;
                background: linear-gradient(135deg, rgba(0, 40, 85, 0.8), rgba(0, 20, 40, 0.8));
                border: 1px solid rgba(0, 184, 255, 0.3);
                color: var(--text);
                text-decoration: none;
                text-align: center;
                font-size: 14px;
                letter-spacing: 1px;
                transition: all 0.3s;
                position: relative;
                overflow: hidden;
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 10px;
            }
            
            .nav-button::before {
                content: ">";
                color: var(--primary);
                font-weight: bold;
            }
            
            .nav-button:hover {
                background: linear-gradient(135deg, rgba(0, 255, 157, 0.2), rgba(0, 184, 255, 0.2));
                border-color: var(--primary);
                transform: translateY(-3px);
                box-shadow: 0 5px 15px rgba(0, 255, 157, 0.2);
            }
            
            .nav-button.critical {
                border-color: var(--accent);
                background: linear-gradient(135deg, rgba(255, 0, 85, 0.1), rgba(139, 0, 0, 0.1));
            }
            
            .nav-button.critical:hover {
                background: linear-gradient(135deg, rgba(255, 0, 85, 0.3), rgba(139, 0, 0, 0.3));
                box-shadow: 0 5px 15px rgba(255, 0, 85, 0.2);
            }
            
            .nav-button.warning {
                border-color: var(--classified);
                background: linear-gradient(135deg, rgba(255, 215, 0, 0.1), rgba(139, 101, 8, 0.1));
            }
            
            .nav-button.warning:hover {
                background: linear-gradient(135deg, rgba(255, 215, 0, 0.3), rgba(139, 101, 8, 0.3));
                box-shadow: 0 5px 15px rgba(255, 215, 0, 0.2);
            }
            
            .intel-section {
                margin: 50px 0;
                padding: 30px;
                background: rgba(0, 29, 61, 0.6);
                border: 1px solid rgba(0, 184, 255, 0.2);
                border-radius: 5px;
                position: relative;
                overflow: hidden;
            }
            
            .intel-section::before {
                content: attr(data-section);
                position: absolute;
                top: -12px;
                left: 20px;
                background: var(--surface);
                padding: 0 15px;
                font-size: 14px;
                color: var(--primary);
                letter-spacing: 1px;
                text-transform: uppercase;
            }
            
            .intel-section h2 {
                color: var(--secondary);
                font-size: 1.8em;
                margin-bottom: 25px;
                padding-bottom: 10px;
                border-bottom: 2px solid rgba(0, 184, 255, 0.3);
                text-transform: uppercase;
                letter-spacing: 2px;
            }
            
            .skill-matrix {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
                gap: 25px;
                margin-top: 20px;
            }
            
            .skill-category {
                padding: 25px;
                background: rgba(0, 40, 85, 0.4);
                border: 1px solid rgba(0, 184, 255, 0.2);
                border-radius: 5px;
                transition: all 0.3s;
                position: relative;
            }
            
            .skill-category:hover {
                border-color: var(--primary);
                transform: translateY(-5px);
                box-shadow: 0 10px 20px rgba(0, 255, 157, 0.1);
            }
            
            .skill-category h3 {
                color: var(--primary);
                margin-bottom: 15px;
                font-size: 1.3em;
                text-transform: uppercase;
                letter-spacing: 1px;
                display: flex;
                align-items: center;
                gap: 10px;
            }
            
            .skill-category h3::before {
                content: "▸";
                color: var(--accent);
            }
            
            .skill-list {
                list-style-type: none;
            }
            
            .skill-list li {
                padding: 8px 0;
                color: var(--text-secondary);
                position: relative;
                padding-left: 25px;
                border-bottom: 1px solid rgba(255, 255, 255, 0.05);
                transition: all 0.3s;
            }
            
            .skill-list li:hover {
                color: var(--text);
                background: rgba(255, 255, 255, 0.03);
                padding-left: 30px;
            }
            
            .skill-list li::before {
                content: "✓";
                position: absolute;
                left: 0;
                color: var(--primary);
                font-weight: bold;
            }
            
            .experience-log {
                margin: 25px 0;
                padding: 20px;
                background: rgba(0, 40, 85, 0.3);
                border-left: 4px solid var(--primary);
                position: relative;
                transition: all 0.3s;
            }
            
            .experience-log:hover {
                background: rgba(0, 40, 85, 0.5);
                transform: translateX(5px);
            }
            
            .log-header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 10px;
                flex-wrap: wrap;
                gap: 10px;
            }
            
            .log-title {
                color: var(--primary);
                font-size: 1.2em;
                font-weight: bold;
            }
            
            .log-agency {
                color: var(--accent);
                font-style: italic;
            }
            
            .log-duration {
                color: var(--classified);
                font-size: 0.9em;
                background: rgba(255, 215, 0, 0.1);
                padding: 3px 10px;
                border-radius: 3px;
            }
            
            .project-grid {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
                gap: 25px;
                margin-top: 20px;
            }
            
            .project-card {
                padding: 25px;
                background: linear-gradient(135deg, rgba(0, 40, 85, 0.4), rgba(0, 20, 40, 0.4));
                border: 1px solid rgba(0, 184, 255, 0.2);
                border-radius: 5px;
                transition: all 0.3s;
                position: relative;
                overflow: hidden;
            }
            
            .project-card::before {
                content: "";
                position: absolute;
                top: 0;
                left: 0;
                right: 0;
                height: 3px;
                background: linear-gradient(90deg, var(--glitch1), var(--glitch2), var(--glitch3));
            }
            
            .project-card:hover {
                transform: translateY(-8px);
                border-color: var(--primary);
                box-shadow: 0 15px 30px rgba(0, 255, 157, 0.15);
            }
            
            .project-card h3 {
                color: var(--primary);
                margin-bottom: 15px;
                font-size: 1.3em;
                text-transform: uppercase;
                letter-spacing: 1px;
            }
            
            .project-card .codename {
                display: inline-block;
                padding: 3px 10px;
                background: rgba(0, 255, 157, 0.1);
                color: var(--primary);
                font-size: 0.8em;
                border-radius: 3px;
                margin-bottom: 10px;
            }
            
            .status-terminal {
                background: rgba(0, 0, 0, 0.8);
                border: 1px solid var(--primary);
                padding: 20px;
                margin: 40px 0;
                font-family: 'SF Mono', monospace;
                position: relative;
            }
            
            .status-terminal::before {
                content: "SYSTEM STATUS";
                position: absolute;
                top: -12px;
                left: 20px;
                background: var(--background);
                padding: 0 15px;
                font-size: 12px;
                color: var(--primary);
                letter-spacing: 1px;
            }
            
            .status-line {
                margin: 8px 0;
                color: var(--terminal);
                font-size: 14px;
                display: flex;
                align-items: center;
                gap: 10px;
            }
            
            .status-line::before {
                content: ">";
                color: var(--accent);
                font-weight: bold;
            }
            
            .status-line.online { color: var(--primary); }
            .status-line.offline { color: var(--accent); }
            .status-line.warning { color: var(--classified); }
            
            footer {
                text-align: center;
                padding: 40px 20px;
                margin-top: 60px;
                border-top: 1px solid rgba(0, 184, 255, 0.3);
                color: var(--text-secondary);
                font-size: 0.9em;
                background: rgba(0, 29, 61, 0.4);
            }
            
            .footer-links {
                display: flex;
                justify-content: center;
                gap: 30px;
                margin-top: 20px;
                flex-wrap: wrap;
            }
            
            .footer-links a {
                color: var(--text-secondary);
                text-decoration: none;
                transition: color 0.3s;
                display: flex;
                align-items: center;
                gap: 8px;
            }
            
            .footer-links a:hover {
                color: var(--primary);
            }
            
            @media (max-width: 768px) {
                h1 { font-size: 2em; }
                .contact-grid { grid-template-columns: 1fr; }
                .nav-terminal { grid-template-columns: 1fr; }
                .skill-matrix { grid-template-columns: 1fr; }
                .project-grid { grid-template-columns: 1fr; }
                .log-header { flex-direction: column; align-items: flex-start; }
            }
            
            /* Glitch effects */
            .glitch {
                position: relative;
                animation: glitch-skew 4s infinite linear;
            }
            
            @keyframes glitch-skew {
                0%, 40%, 44%, 58%, 61%, 65%, 69%, 73%, 100% {
                    transform: skew(0deg);
                }
                41% { transform: skew(10deg); }
                42% { transform: skew(-10deg); }
                59% { transform: skew(40deg) skew(10deg); }
                60% { transform: skew(-40deg) skew(-10deg); }
                63% { transform: skew(10deg); }
                70% { transform: skew(-50deg); }
                71% { transform: skew(10deg); }
            }
            
            .glitch::before,
            .glitch::after {
                content: attr(data-text);
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
            }
            
            .glitch::before {
                left: 2px;
                text-shadow: -2px 0 var(--glitch2);
                clip: rect(44px, 450px, 56px, 0);
                animation: glitch-anim 5s infinite linear alternate-reverse;
            }
            
            .glitch::after {
                left: -2px;
                text-shadow: -2px 0 var(--glitch3);
                clip: rect(44px, 450px, 56px, 0);
                animation: glitch-anim2 5s infinite linear alternate-reverse;
            }
            
            @keyframes glitch-anim {
                0% { clip: rect(42px, 9999px, 44px, 0); }
                5% { clip: rect(12px, 9999px, 59px, 0); }
                10% { clip: rect(48px, 9999px, 29px, 0); }
                15% { clip: rect(42px, 9999px, 73px, 0); }
                20% { clip: rect(63px, 9999px, 27px, 0); }
                25% { clip: rect(34px, 9999px, 55px, 0); }
                30% { clip: rect(86px, 9999px, 73px, 0); }
                35% { clip: rect(20px, 9999px, 20px, 0); }
                40% { clip: rect(26px, 9999px, 60px, 0); }
                45% { clip: rect(25px, 9999px, 66px, 0); }
                50% { clip: rect(57px, 9999px, 98px, 0); }
                55% { clip: rect(5px, 9999px, 46px, 0); }
                60% { clip: rect(82px, 9999px, 31px, 0); }
                65% { clip: rect(54px, 9999px, 27px, 0); }
                70% { clip: rect(28px, 9999px, 99px, 0); }
                75% { clip: rect(45px, 9999px, 69px, 0); }
                80% { clip: rect(23px, 9999px, 85px, 0); }
                85% { clip: rect(54px, 9999px, 84px, 0); }
                90% { clip: rect(45px, 9999px, 47px, 0); }
                95% { clip: rect(37px, 9999px, 20px, 0); }
                100% { clip: rect(4px, 9999px, 91px, 0); }
            }
            
            @keyframes glitch-anim2 {
                0% { clip: rect(65px, 9999px, 100px, 0); }
                5% { clip: rect(52px, 9999px, 74px, 0); }
                10% { clip: rect(79px, 9999px, 85px, 0); }
                15% { clip: rect(75px, 9999px, 5px, 0); }
                20% { clip: rect(67px, 9999px, 61px, 0); }
                25% { clip: rect(14px, 9999px, 79px, 0); }
                30% { clip: rect(1px, 9999px, 66px, 0); }
                35% { clip: rect(86px, 9999px, 30px, 0); }
                40% { clip: rect(23px, 9999px, 98px, 0); }
                45% { clip: rect(85px, 9999px, 72px, 0); }
                50% { clip: rect(71px, 9999px, 75px, 0); }
                55% { clip: rect(2px, 9999px, 48px, 0); }
                60% { clip: rect(30px, 9999px, 16px, 0); }
                65% { clip: rect(59px, 9999px, 50px, 0); }
                70% { clip: rect(41px, 9999px, 62px, 0); }
                75% { clip: rect(2px, 9999px, 82px, 0); }
                80% { clip: rect(47px, 9999px, 73px, 0); }
                85% { clip: rect(3px, 9999px, 27px, 0); }
                90% { clip: rect(40px, 9999px, 86px, 0); }
                95% { clip: rect(45px, 9999px, 72px, 0); }
                100% { clip: rect(23px, 9999px, 49px, 0); }
            }
        </style>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    </head>
    <body>
        <div class="matrix-background"></div>
        
        <div class="classified-banner">
            TOP SECRET // EYES ONLY // CLEARANCE LEVEL: OMEGA
        </div>

        <div class="command-line">
            <span style="color: var(--primary);">Initializing secure connection...</span><br>
            <span style="color: var(--secondary);">Establishing encrypted channel...</span><br>
            <span style="color: var(--primary);">Connection established. Welcome, Director.</span><br>
            <span style="color: var(--terminal);">Accessing dossier: ABU7MIDAN_PROFILE</span>
            <span class="blinking-cursor"></span>
        </div>

        <header>
            <div class="id-badge">
                <h1 class="glitch" data-text="MOHAMMAD ABU HUMAIDAN">MOHAMMAD ABU HUMAIDAN</h1>
                <div class="codename">OPERATIVE: "ARCHITECT"</div>
                <div class="clearance-level">CLEARANCE: OMEGA LEVEL</div>
                <p style="color: var(--text-secondary); margin-top: 20px; max-width: 600px;">
                    <i class="fas fa-terminal"></i> Integration Architect | Cloud Architect | APIGEE | WSO2 | KONG | .NET |
                    KUBERNETES | DEVOPS | SRE | EVENT-DRIVEN SYSTEMS
                </p>
            </div>
        </header>

