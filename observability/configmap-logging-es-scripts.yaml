apiVersion: v1
data:
  pre-stop-hook-script.sh: |
    #!/usr/bin/env bash

    set -uo pipefail

    # This script will wait for up to $PRE_STOP_ADDITIONAL_WAIT_SECONDS before allowing termination of the Pod
    # This slows down the process shutdown and allows to make changes to the pool gracefully, without blackholing traffic when DNS
    # still contains the IP that is already inactive.
    # As this runs in parallel to grace period after which process is SIGKILLed,
    # it should be set to allow enough time for the process to gracefully terminate.
    # It allows kube-proxy to refresh its rules and remove the terminating Pod IP.
    # Kube-proxy refresh period defaults to every 30 seconds, but the operation itself can take much longer if
    # using iptables with a lot of services, in which case the default 30sec might not be enough.
    # Also gives some additional bonus time to in-flight requests to terminate, and new requests to still
    # target the Pod IP before Elasticsearch stops.
    PRE_STOP_ADDITIONAL_WAIT_SECONDS=${PRE_STOP_ADDITIONAL_WAIT_SECONDS:=50}

    # PRE_STOP_SHUTDOWN_TYPE controls the type of shutdown that will be communicated to Elasticsearch. This should not be
    # changed to anything but restart. Specifically setting remove can lead to extensive data migration that might exceed the
    # terminationGracePeriodSeconds and lead to an incomplete shutdown.
    shutdown_type=${PRE_STOP_SHUTDOWN_TYPE:=restart}

    # capture response bodies in a temp file for better error messages and to extract necessary information for subsequent requests
    resp_body=$(mktemp)
    # shellcheck disable=SC2064
    trap "rm -f $resp_body" EXIT

    script_start=$(date +%s)

    # compute time in seconds since the given start time
    function duration() {
      local start=$1
      end=$(date +%s)
      echo $((end-start))
    }

    # use DNS errors as a proxy to abort this script early if there is no chance of successful completion
    # DNS errors are for example expected when the whole cluster including its service is being deleted
    # and the service URL can no longer be resolved even though we still have running Pods.
    max_dns_errors=${PRE_STOP_MAX_DNS_ERRORS:=2}
    global_dns_error_cnt=0

    function request() {
      local status exit
      status=$(curl -k -sS -o "${resp_body}" -w "%{http_code}" "$@")
      exit=$?
      if [ "$exit" -ne 0 ] || [ "$status" -lt 200 ] || [ "$status" -gt 299 ]; then
        # track curl DNS errors separately
        if [ "$exit" -eq 6 ]; then ((global_dns_error_cnt++)); fi
        # make sure we have a non-zero exit code in the presence of errors
        if [ "$exit" -eq 0 ]; then exit=1; fi
        log "$status" "$3" #by convention the third arg contains the URL
        return $exit
      fi
      global_dns_error_cnt=0
      return 0
    }

    # number of retries to try not to last more than default terminateGracePeriodSeconds (0 + 1 + 2 + 4 + 8 + 16 + 32 + 64 < 180s)
    retries_count=8

    function retry() {
      local retries=$1
      shift

      local count=0
      until "$@"; do
        exit=$?
        wait=$((2 ** count))
        count=$((count + 1))
        if [ $global_dns_error_cnt -gt "$max_dns_errors" ]; then
          error_exit "too many DNS errors, giving up"
        fi
        if [ $count -lt "$retries" ]; then
          log "retry $count/$retries exited $exit, retrying in $wait seconds"
          sleep $wait
        else
          log "retry $count/$retries exited $exit, no more retries left"
          return $exit
        fi
      done
      return 0
    }

    function log() {
       local timestamp
       timestamp=$(date --iso-8601=seconds)
       echo "{\"@timestamp\": \"${timestamp}\", \"message\": \"$*\", \"ecs.version\": \"1.2.0\", \"event.dataset\": \"elasticsearch.pre-stop-hook\"}" | tee /proc/1/fd/2 2> /dev/null
    }

    function error_exit() {
      log "$*"
      delayed_exit 1
    }

    function delayed_exit() {
      local elapsed
      elapsed=$(duration "${script_start}")
      local remaining=$((PRE_STOP_ADDITIONAL_WAIT_SECONDS - elapsed))
      if (( remaining < 0 )); then
        exit "${1-0}"
      fi
      log "delaying termination for ${remaining} seconds"
      sleep $remaining
      exit "${1-0}"
    }

    function supports_node_shutdown() {
      local version="$1"
      version="${version#[vV]}"
      major="${version%%\.*}"
      minor="${version#*.}"
      minor="${minor%.*}"
      patch="${version##*.}"
      # node shutdown is supported as of 7.15.2
      if [ "$major" -lt 7 ]  || { [ "$major" -eq 7 ] && [ "$minor" -eq 15 ] && [ "$patch" -lt 2 ]; }; then
        return 1
      fi
      return 0
    }

    version=""
    if [[ -f "/mnt/elastic-internal/downward-api/labels" ]]; then
      # get Elasticsearch version from the downward API
      version=$(grep "elasticsearch.k8s.elastic.co/version" "/mnt/elastic-internal/downward-api/labels" | cut -d '=' -f 2)
      # remove quotes
      version=$(echo "${version}" | tr -d '"')
    fi

    # if ES version does not support node shutdown exit early
    if ! supports_node_shutdown "$version"; then
      delayed_exit
    fi

    # setup basic auth if credentials are available
    if [ -f "/mnt/elastic-internal/pod-mounted-users/elastic-internal-pre-stop" ]; then
      PROBE_PASSWORD=$(<"/mnt/elastic-internal/pod-mounted-users/elastic-internal-pre-stop")
      BASIC_AUTH=("-u" "elastic-internal-pre-stop:${PROBE_PASSWORD}")
    else
      # typically the case on upgrades from versions that did not have this script yet and the necessary volume mounts are missing
      log "no API credentials available, will not attempt node shutdown orchestration from pre-stop hook"
      delayed_exit
    fi

    ES_URL="https://logging-es-internal-http.observability.svc:9200"

    log "retrieving node ID"
    if ! retry "$retries_count" request -X GET "${ES_URL}/_cat/nodes?full_id=true&h=id,name" "${BASIC_AUTH[@]}"
    then
      error_exit "failed to retrieve nodes"
    fi

    if ! NODE_ID="$(grep "${POD_NAME}" "${resp_body}" | cut -f 1 -d ' ')"
    then
      error_exit "failed to extract node id"
    fi

    # check if there is an ongoing shutdown request
    if ! request -X GET "${ES_URL}/_nodes/${NODE_ID}/shutdown" "${BASIC_AUTH[@]}"
    then
      error_exit "failed to retrieve shutdown status"
    fi

    if grep -q -v '"nodes":\[\]' "$resp_body"; then
      log "shutdown managed by ECK operator"
      delayed_exit
    fi

    log "initiating node shutdown"
    if ! retry "$retries_count" request -X PUT "${ES_URL}/_nodes/${NODE_ID}/shutdown" "${BASIC_AUTH[@]}" -H 'Content-Type: application/json' -d"
    {
      \"type\": \"${shutdown_type}\",
      \"reason\": \"pre-stop hook\"
    }"
    then
      error_exit "failed to call node shutdown API"
    fi

    while :
    do
      log "waiting for node shutdown to complete"
      if request -X GET "${ES_URL}/_nodes/${NODE_ID}/shutdown" "${BASIC_AUTH[@]}" &&
        grep -q -v 'IN_PROGRESS\|STALLED' "$resp_body"
      then
        break
      fi
      sleep 10
    done

    delayed_exit
  prepare-fs.sh: "#!/usr/bin/env bash\n\n\tset -eu\n\n\t# the operator only works with the default ES distribution\n\tlicense=/usr/share/elasticsearch/LICENSE.txt\n\tif [[ ! -f $license || $(grep -Exc \"ELASTIC LICENSE AGREEMENT|Elastic License 2.0\" $license) -ne 1 ]]; then\n\t\t>&2 echo \"unsupported_distribution\"\n\t\texit 42\n\tfi\n\n\t# compute time in seconds since the given start time\n\tfunction duration() {\n\t\tlocal start=$1\n\t\tend=$(date +%s)\n\t\techo $((end-start))\n\t}\n\n\t######################\n\t#        START       #\n\t######################\n\n\tscript_start=$(date +%s)\n\n\techo \"Starting init script\"\n\n\t######################\n\t#  Files persistence #\n\t######################\n\n\t# Persist the content of bin/, config/ and plugins/ to a volume,\n\t# so installed plugins files can to be used by the ES container\n\tmv_start=$(date +%s)\n\t\n\t\tif [[ -z \"$(ls -A /usr/share/elasticsearch/config)\" ]]; then\n\t\t\techo \"Empty dir /usr/share/elasticsearch/config\"\n\t\telse\n\t\t\techo \"Copying /usr/share/elasticsearch/config/* to /mnt/elastic-internal/elasticsearch-config-local/\"\n\t\t\t# Use \"yes\" and \"-f\" as we want the init container to be idempotent and not to fail when executed more than once.\n\t\t\tyes | cp -avf /usr/share/elasticsearch/config/* /mnt/elastic-internal/elasticsearch-config-local/ \n\t\tfi\n\t\n\t\tif [[ -z \"$(ls -A /usr/share/elasticsearch/plugins)\" ]]; then\n\t\t\techo \"Empty dir /usr/share/elasticsearch/plugins\"\n\t\telse\n\t\t\techo \"Copying /usr/share/elasticsearch/plugins/* to /mnt/elastic-internal/elasticsearch-plugins-local/\"\n\t\t\t# Use \"yes\" and \"-f\" as we want the init container to be idempotent and not to fail when executed more than once.\n\t\t\tyes | cp -avf /usr/share/elasticsearch/plugins/* /mnt/elastic-internal/elasticsearch-plugins-local/ \n\t\tfi\n\t\n\t\tif [[ -z \"$(ls -A /usr/share/elasticsearch/bin)\" ]]; then\n\t\t\techo \"Empty dir /usr/share/elasticsearch/bin\"\n\t\telse\n\t\t\techo \"Copying /usr/share/elasticsearch/bin/* to /mnt/elastic-internal/elasticsearch-bin-local/\"\n\t\t\t# Use \"yes\" and \"-f\" as we want the init container to be idempotent and not to fail when executed more than once.\n\t\t\tyes | cp -avf /usr/share/elasticsearch/bin/* /mnt/elastic-internal/elasticsearch-bin-local/ \n\t\tfi\n\t\n\techo \"Files copy duration: $(duration $mv_start) sec.\"\n\n\t######################\n\t#  Config linking    #\n\t######################\n\n\t# Link individual files from their mount location into the config dir\n\t# to a volume, to be used by the ES container\n\tln_start=$(date +%s)\n\t\n\t\techo \"Linking /mnt/elastic-internal/xpack-file-realm/users to /mnt/elastic-internal/elasticsearch-config-local/users\"\n\t\tln -sf /mnt/elastic-internal/xpack-file-realm/users /mnt/elastic-internal/elasticsearch-config-local/users\n\t\n\t\techo \"Linking /mnt/elastic-internal/xpack-file-realm/roles.yml to /mnt/elastic-internal/elasticsearch-config-local/roles.yml\"\n\t\tln -sf /mnt/elastic-internal/xpack-file-realm/roles.yml /mnt/elastic-internal/elasticsearch-config-local/roles.yml\n\t\n\t\techo \"Linking /mnt/elastic-internal/xpack-file-realm/users_roles to /mnt/elastic-internal/elasticsearch-config-local/users_roles\"\n\t\tln -sf /mnt/elastic-internal/xpack-file-realm/users_roles /mnt/elastic-internal/elasticsearch-config-local/users_roles\n\t\n\t\techo \"Linking /mnt/elastic-internal/elasticsearch-config/elasticsearch.yml to /mnt/elastic-internal/elasticsearch-config-local/elasticsearch.yml\"\n\t\tln -sf /mnt/elastic-internal/elasticsearch-config/elasticsearch.yml /mnt/elastic-internal/elasticsearch-config-local/elasticsearch.yml\n\t\n\t\techo \"Linking /mnt/elastic-internal/unicast-hosts/unicast_hosts.txt to /mnt/elastic-internal/elasticsearch-config-local/unicast_hosts.txt\"\n\t\tln -sf /mnt/elastic-internal/unicast-hosts/unicast_hosts.txt /mnt/elastic-internal/elasticsearch-config-local/unicast_hosts.txt\n\t\n\t\techo \"Linking /mnt/elastic-internal/xpack-file-realm/service_tokens to /mnt/elastic-internal/elasticsearch-config-local/service_tokens\"\n\t\tln -sf /mnt/elastic-internal/xpack-file-realm/service_tokens /mnt/elastic-internal/elasticsearch-config-local/service_tokens\n\t\n\techo \"File linking duration: $(duration $ln_start) sec.\"\n\n\t######################\n\t#  Volumes chown     #\n\t######################\n\n\t# chown the data and logs volume to the elasticsearch user\n\t# only done when running as root, other cases should be handled\n\t# with a proper security context\n\tchown_start=$(date +%s)\n\tif [[ $EUID -eq 0 ]]; then\n\t\t\n\t\t\techo \"chowning /usr/share/elasticsearch/data to elasticsearch:elasticsearch\"\n\t\t\tchown -v elasticsearch:elasticsearch /usr/share/elasticsearch/data\n\t\t\n\t\t\techo \"chowning /usr/share/elasticsearch/logs to elasticsearch:elasticsearch\"\n\t\t\tchown -v elasticsearch:elasticsearch /usr/share/elasticsearch/logs\n\t\t\n\tfi\n\techo \"chown duration: $(duration $chown_start) sec.\"\n\n\t######################\n\t#  Wait for certs    #\n\t######################\n\n\tINIT_CONTAINER_LOCAL_KEY_PATH=/mnt/elastic-internal/transport-certificates/${POD_NAME}.tls.key\n\tDISABLED_CERT_MARKER=/mnt/elastic-internal/transport-certificates/transport.certs.disabled\n\t# wait for the transport certificates to show up\n\techo \"waiting for the transport certificates (${INIT_CONTAINER_LOCAL_KEY_PATH} or ${DISABLED_CERT_MARKER})\"\n\twait_start=$(date +%s)\n\twhile [ ! -f ${INIT_CONTAINER_LOCAL_KEY_PATH} ] && [ ! -f ${DISABLED_CERT_MARKER} ]\n\tdo\n\t\tsleep 0.2\n\tdone\n\techo \"wait duration: $(duration wait_start) sec.\"\n\tif [ -f ${DISABLED_CERT_MARKER} ]; then\n\t\techo \"Skipped transport certificate check because of .spec.transport.tls.selfSignedCerts.disabled\"\n\tfi\n\n\n\t######################\n\t#         End        #\n\t######################\n\techo \"Init script successful\"\n\techo \"Script duration: $(duration $script_start) sec.\"\n\n"
  readiness-port-script.sh: |
    #!/usr/bin/env bash
    if ! nc -z -v -w5 127.0.0.1 8080 >/dev/null 2>&1; then
        echo "Elasticsearch is not ready yet. Check the server logs."
        exit 1
    fi
  readiness-probe-script.sh: "#!/usr/bin/env bash\n\n# fail should be called as a last resort to help the user to understand why the probe failed\nfunction fail {\n  timestamp=$(date --iso-8601=seconds)\n  echo \"{\\\"timestamp\\\": \\\"${timestamp}\\\", \\\"message\\\": \\\"readiness probe failed\\\", \"$1\"}\" | tee /proc/1/fd/2 2> /dev/null\n  exit 1\n}\n\nlabels=\"/mnt/elastic-internal/downward-api/labels\"\n\nversion=\"\"\nif [[ -f \"${labels}\" ]]; then\n  # get Elasticsearch version from the downward API\n  version=$(grep \"elasticsearch.k8s.elastic.co/version\" ${labels} | cut -d '=' -f 2)\n  # remove quotes\n  version=$(echo \"${version}\" | tr -d '\"')\nfi\n\nREADINESS_PROBE_TIMEOUT=${READINESS_PROBE_TIMEOUT:=3}\n\n# Check if PROBE_PASSWORD_PATH is set, otherwise fall back to its former name in 1.0.0.beta-1: PROBE_PASSWORD_FILE\nif [[ -z \"${PROBE_PASSWORD_PATH}\" ]]; then\n  probe_password_path=\"${PROBE_PASSWORD_FILE}\"\nelse\n  probe_password_path=\"${PROBE_PASSWORD_PATH}\"\nfi\n\n# setup basic auth if credentials are available\nif [ -n \"${PROBE_USERNAME}\" ] && [ -f \"${probe_password_path}\" ]; then\n  PROBE_PASSWORD=$(<${probe_password_path})\n  BASIC_AUTH=\"-u ${PROBE_USERNAME}:${PROBE_PASSWORD}\"\nelse\n  BASIC_AUTH=''\nfi\n\n# Check if we are using IPv6\nif [[ $POD_IP =~ .*:.* ]]; then\n  LOOPBACK=\"[::1]\"\nelse \n  LOOPBACK=127.0.0.1\nfi\n\n# request Elasticsearch on /\n# we are turning globbing off to allow for unescaped [] in case of IPv6\nENDPOINT=\"${READINESS_PROBE_PROTOCOL:-https}://${LOOPBACK}:9200/\"\nORIGIN_HEADER=\"x-elastic-product-origin: cloud\"\nstatus=$(curl -o /dev/null -w \"%{http_code}\" --max-time ${READINESS_PROBE_TIMEOUT} -H \"${ORIGIN_HEADER}\" -XGET -g -s -k ${BASIC_AUTH} $ENDPOINT)\ncurl_rc=$?\n\nif [[ ${curl_rc} -ne 0 ]]; then\n  fail \"\\\"curl_rc\\\": \\\"${curl_rc}\\\"\"\nfi\n\n# ready if status code 200, 503 is tolerable if ES version is 6.x\nif [[ ${status} == \"200\" ]] || [[ ${status} == \"503\" && ${version:0:2} == \"6.\" ]]; then\n  exit 0\nelse\n  fail \" \\\"status\\\": \\\"${status}\\\", \\\"version\\\":\\\"${version}\\\" \"\nfi\n"
  suspend.sh: |
    #!/usr/bin/env bash
    set -eu

    while [[ $(grep -Exc $HOSTNAME /mnt/elastic-internal/scripts/suspended_pods.txt) -eq 1 ]]; do
    echo Pod suspended via eck.k8s.elastic.co/suspend annotation
    sleep 10
    done
  suspended_pods.txt: ""
kind: ConfigMap
metadata:
  annotations:
    argocd.argoproj.io/tracking-id: observability:/ConfigMap:observability/logging-es-scripts
    kubectl.kubernetes.io/last-applied-configuration: |
      {"apiVersion":"v1","data":{"pre-stop-hook-script.sh":"#!/usr/bin/env bash\n\nset -uo pipefail\n\n# This script will wait for up to $PRE_STOP_ADDITIONAL_WAIT_SECONDS before allowing termination of the Pod\n# This slows down the process shutdown and allows to make changes to the pool gracefully, without blackholing traffic when DNS\n# still contains the IP that is already inactive.\n# As this runs in parallel to grace period after which process is SIGKILLed,\n# it should be set to allow enough time for the process to gracefully terminate.\n# It allows kube-proxy to refresh its rules and remove the terminating Pod IP.\n# Kube-proxy refresh period defaults to every 30 seconds, but the operation itself can take much longer if\n# using iptables with a lot of services, in which case the default 30sec might not be enough.\n# Also gives some additional bonus time to in-flight requests to terminate, and new requests to still\n# target the Pod IP before Elasticsearch stops.\nPRE_STOP_ADDITIONAL_WAIT_SECONDS=${PRE_STOP_ADDITIONAL_WAIT_SECONDS:=50}\n\n# PRE_STOP_SHUTDOWN_TYPE controls the type of shutdown that will be communicated to Elasticsearch. This should not be\n# changed to anything but restart. Specifically setting remove can lead to extensive data migration that might exceed the\n# terminationGracePeriodSeconds and lead to an incomplete shutdown.\nshutdown_type=${PRE_STOP_SHUTDOWN_TYPE:=restart}\n\n# capture response bodies in a temp file for better error messages and to extract necessary information for subsequent requests\nresp_body=$(mktemp)\n# shellcheck disable=SC2064\ntrap \"rm -f $resp_body\" EXIT\n\nscript_start=$(date +%s)\n\n# compute time in seconds since the given start time\nfunction duration() {\n  local start=$1\n  end=$(date +%s)\n  echo $((end-start))\n}\n\n# use DNS errors as a proxy to abort this script early if there is no chance of successful completion\n# DNS errors are for example expected when the whole cluster including its service is being deleted\n# and the service URL can no longer be resolved even though we still have running Pods.\nmax_dns_errors=${PRE_STOP_MAX_DNS_ERRORS:=2}\nglobal_dns_error_cnt=0\n\nfunction request() {\n  local status exit\n  status=$(curl -k -sS -o \"${resp_body}\" -w \"%{http_code}\" \"$@\")\n  exit=$?\n  if [ \"$exit\" -ne 0 ] || [ \"$status\" -lt 200 ] || [ \"$status\" -gt 299 ]; then\n    # track curl DNS errors separately\n    if [ \"$exit\" -eq 6 ]; then ((global_dns_error_cnt++)); fi\n    # make sure we have a non-zero exit code in the presence of errors\n    if [ \"$exit\" -eq 0 ]; then exit=1; fi\n    log \"$status\" \"$3\" #by convention the third arg contains the URL\n    return $exit\n  fi\n  global_dns_error_cnt=0\n  return 0\n}\n\n# number of retries to try not to last more than default terminateGracePeriodSeconds (0 + 1 + 2 + 4 + 8 + 16 + 32 + 64 \u003c 180s)\nretries_count=8\n\nfunction retry() {\n  local retries=$1\n  shift\n\n  local count=0\n  until \"$@\"; do\n    exit=$?\n    wait=$((2 ** count))\n    count=$((count + 1))\n    if [ $global_dns_error_cnt -gt \"$max_dns_errors\" ]; then\n      error_exit \"too many DNS errors, giving up\"\n    fi\n    if [ $count -lt \"$retries\" ]; then\n      log \"retry $count/$retries exited $exit, retrying in $wait seconds\"\n      sleep $wait\n    else\n      log \"retry $count/$retries exited $exit, no more retries left\"\n      return $exit\n    fi\n  done\n  return 0\n}\n\nfunction log() {\n   local timestamp\n   timestamp=$(date --iso-8601=seconds)\n   echo \"{\\\"@timestamp\\\": \\\"${timestamp}\\\", \\\"message\\\": \\\"$*\\\", \\\"ecs.version\\\": \\\"1.2.0\\\", \\\"event.dataset\\\": \\\"elasticsearch.pre-stop-hook\\\"}\" | tee /proc/1/fd/2 2\u003e /dev/null\n}\n\nfunction error_exit() {\n  log \"$*\"\n  delayed_exit 1\n}\n\nfunction delayed_exit() {\n  local elapsed\n  elapsed=$(duration \"${script_start}\")\n  local remaining=$((PRE_STOP_ADDITIONAL_WAIT_SECONDS - elapsed))\n  if (( remaining \u003c 0 )); then\n    exit \"${1-0}\"\n  fi\n  log \"delaying termination for ${remaining} seconds\"\n  sleep $remaining\n  exit \"${1-0}\"\n}\n\nfunction supports_node_shutdown() {\n  local version=\"$1\"\n  version=\"${version#[vV]}\"\n  major=\"${version%%\\.*}\"\n  minor=\"${version#*.}\"\n  minor=\"${minor%.*}\"\n  patch=\"${version##*.}\"\n  # node shutdown is supported as of 7.15.2\n  if [ \"$major\" -lt 7 ]  || { [ \"$major\" -eq 7 ] \u0026\u0026 [ \"$minor\" -eq 15 ] \u0026\u0026 [ \"$patch\" -lt 2 ]; }; then\n    return 1\n  fi\n  return 0\n}\n\nversion=\"\"\nif [[ -f \"/mnt/elastic-internal/downward-api/labels\" ]]; then\n  # get Elasticsearch version from the downward API\n  version=$(grep \"elasticsearch.k8s.elastic.co/version\" \"/mnt/elastic-internal/downward-api/labels\" | cut -d '=' -f 2)\n  # remove quotes\n  version=$(echo \"${version}\" | tr -d '\"')\nfi\n\n# if ES version does not support node shutdown exit early\nif ! supports_node_shutdown \"$version\"; then\n  delayed_exit\nfi\n\n# setup basic auth if credentials are available\nif [ -f \"/mnt/elastic-internal/pod-mounted-users/elastic-internal-pre-stop\" ]; then\n  PROBE_PASSWORD=$(\u003c\"/mnt/elastic-internal/pod-mounted-users/elastic-internal-pre-stop\")\n  BASIC_AUTH=(\"-u\" \"elastic-internal-pre-stop:${PROBE_PASSWORD}\")\nelse\n  # typically the case on upgrades from versions that did not have this script yet and the necessary volume mounts are missing\n  log \"no API credentials available, will not attempt node shutdown orchestration from pre-stop hook\"\n  delayed_exit\nfi\n\nES_URL=\"https://logging-es-internal-http.observability.svc:9200\"\n\nlog \"retrieving node ID\"\nif ! retry \"$retries_count\" request -X GET \"${ES_URL}/_cat/nodes?full_id=true\u0026h=id,name\" \"${BASIC_AUTH[@]}\"\nthen\n  error_exit \"failed to retrieve nodes\"\nfi\n\nif ! NODE_ID=\"$(grep \"${POD_NAME}\" \"${resp_body}\" | cut -f 1 -d ' ')\"\nthen\n  error_exit \"failed to extract node id\"\nfi\n\n# check if there is an ongoing shutdown request\nif ! request -X GET \"${ES_URL}/_nodes/${NODE_ID}/shutdown\" \"${BASIC_AUTH[@]}\"\nthen\n  error_exit \"failed to retrieve shutdown status\"\nfi\n\nif grep -q -v '\"nodes\":\\[\\]' \"$resp_body\"; then\n  log \"shutdown managed by ECK operator\"\n  delayed_exit\nfi\n\nlog \"initiating node shutdown\"\nif ! retry \"$retries_count\" request -X PUT \"${ES_URL}/_nodes/${NODE_ID}/shutdown\" \"${BASIC_AUTH[@]}\" -H 'Content-Type: application/json' -d\"\n{\n  \\\"type\\\": \\\"${shutdown_type}\\\",\n  \\\"reason\\\": \\\"pre-stop hook\\\"\n}\"\nthen\n  error_exit \"failed to call node shutdown API\"\nfi\n\nwhile :\ndo\n  log \"waiting for node shutdown to complete\"\n  if request -X GET \"${ES_URL}/_nodes/${NODE_ID}/shutdown\" \"${BASIC_AUTH[@]}\" \u0026\u0026\n    grep -q -v 'IN_PROGRESS\\|STALLED' \"$resp_body\"\n  then\n    break\n  fi\n  sleep 10\ndone\n\ndelayed_exit\n","prepare-fs.sh":"#!/usr/bin/env bash\n\n\tset -eu\n\n\t# the operator only works with the default ES distribution\n\tlicense=/usr/share/elasticsearch/LICENSE.txt\n\tif [[ ! -f $license || $(grep -Exc \"ELASTIC LICENSE AGREEMENT|Elastic License 2.0\" $license) -ne 1 ]]; then\n\t\t\u003e\u00262 echo \"unsupported_distribution\"\n\t\texit 42\n\tfi\n\n\t# compute time in seconds since the given start time\n\tfunction duration() {\n\t\tlocal start=$1\n\t\tend=$(date +%s)\n\t\techo $((end-start))\n\t}\n\n\t######################\n\t#        START       #\n\t######################\n\n\tscript_start=$(date +%s)\n\n\techo \"Starting init script\"\n\n\t######################\n\t#  Files persistence #\n\t######################\n\n\t# Persist the content of bin/, config/ and plugins/ to a volume,\n\t# so installed plugins files can to be used by the ES container\n\tmv_start=$(date +%s)\n\t\n\t\tif [[ -z \"$(ls -A /usr/share/elasticsearch/config)\" ]]; then\n\t\t\techo \"Empty dir /usr/share/elasticsearch/config\"\n\t\telse\n\t\t\techo \"Copying /usr/share/elasticsearch/config/* to /mnt/elastic-internal/elasticsearch-config-local/\"\n\t\t\t# Use \"yes\" and \"-f\" as we want the init container to be idempotent and not to fail when executed more than once.\n\t\t\tyes | cp -avf /usr/share/elasticsearch/config/* /mnt/elastic-internal/elasticsearch-config-local/ \n\t\tfi\n\t\n\t\tif [[ -z \"$(ls -A /usr/share/elasticsearch/plugins)\" ]]; then\n\t\t\techo \"Empty dir /usr/share/elasticsearch/plugins\"\n\t\telse\n\t\t\techo \"Copying /usr/share/elasticsearch/plugins/* to /mnt/elastic-internal/elasticsearch-plugins-local/\"\n\t\t\t# Use \"yes\" and \"-f\" as we want the init container to be idempotent and not to fail when executed more than once.\n\t\t\tyes | cp -avf /usr/share/elasticsearch/plugins/* /mnt/elastic-internal/elasticsearch-plugins-local/ \n\t\tfi\n\t\n\t\tif [[ -z \"$(ls -A /usr/share/elasticsearch/bin)\" ]]; then\n\t\t\techo \"Empty dir /usr/share/elasticsearch/bin\"\n\t\telse\n\t\t\techo \"Copying /usr/share/elasticsearch/bin/* to /mnt/elastic-internal/elasticsearch-bin-local/\"\n\t\t\t# Use \"yes\" and \"-f\" as we want the init container to be idempotent and not to fail when executed more than once.\n\t\t\tyes | cp -avf /usr/share/elasticsearch/bin/* /mnt/elastic-internal/elasticsearch-bin-local/ \n\t\tfi\n\t\n\techo \"Files copy duration: $(duration $mv_start) sec.\"\n\n\t######################\n\t#  Config linking    #\n\t######################\n\n\t# Link individual files from their mount location into the config dir\n\t# to a volume, to be used by the ES container\n\tln_start=$(date +%s)\n\t\n\t\techo \"Linking /mnt/elastic-internal/xpack-file-realm/users to /mnt/elastic-internal/elasticsearch-config-local/users\"\n\t\tln -sf /mnt/elastic-internal/xpack-file-realm/users /mnt/elastic-internal/elasticsearch-config-local/users\n\t\n\t\techo \"Linking /mnt/elastic-internal/xpack-file-realm/roles.yml to /mnt/elastic-internal/elasticsearch-config-local/roles.yml\"\n\t\tln -sf /mnt/elastic-internal/xpack-file-realm/roles.yml /mnt/elastic-internal/elasticsearch-config-local/roles.yml\n\t\n\t\techo \"Linking /mnt/elastic-internal/xpack-file-realm/users_roles to /mnt/elastic-internal/elasticsearch-config-local/users_roles\"\n\t\tln -sf /mnt/elastic-internal/xpack-file-realm/users_roles /mnt/elastic-internal/elasticsearch-config-local/users_roles\n\t\n\t\techo \"Linking /mnt/elastic-internal/elasticsearch-config/elasticsearch.yml to /mnt/elastic-internal/elasticsearch-config-local/elasticsearch.yml\"\n\t\tln -sf /mnt/elastic-internal/elasticsearch-config/elasticsearch.yml /mnt/elastic-internal/elasticsearch-config-local/elasticsearch.yml\n\t\n\t\techo \"Linking /mnt/elastic-internal/unicast-hosts/unicast_hosts.txt to /mnt/elastic-internal/elasticsearch-config-local/unicast_hosts.txt\"\n\t\tln -sf /mnt/elastic-internal/unicast-hosts/unicast_hosts.txt /mnt/elastic-internal/elasticsearch-config-local/unicast_hosts.txt\n\t\n\t\techo \"Linking /mnt/elastic-internal/xpack-file-realm/service_tokens to /mnt/elastic-internal/elasticsearch-config-local/service_tokens\"\n\t\tln -sf /mnt/elastic-internal/xpack-file-realm/service_tokens /mnt/elastic-internal/elasticsearch-config-local/service_tokens\n\t\n\techo \"File linking duration: $(duration $ln_start) sec.\"\n\n\t######################\n\t#  Volumes chown     #\n\t######################\n\n\t# chown the data and logs volume to the elasticsearch user\n\t# only done when running as root, other cases should be handled\n\t# with a proper security context\n\tchown_start=$(date +%s)\n\tif [[ $EUID -eq 0 ]]; then\n\t\t\n\t\t\techo \"chowning /usr/share/elasticsearch/data to elasticsearch:elasticsearch\"\n\t\t\tchown -v elasticsearch:elasticsearch /usr/share/elasticsearch/data\n\t\t\n\t\t\techo \"chowning /usr/share/elasticsearch/logs to elasticsearch:elasticsearch\"\n\t\t\tchown -v elasticsearch:elasticsearch /usr/share/elasticsearch/logs\n\t\t\n\tfi\n\techo \"chown duration: $(duration $chown_start) sec.\"\n\n\t######################\n\t#  Wait for certs    #\n\t######################\n\n\tINIT_CONTAINER_LOCAL_KEY_PATH=/mnt/elastic-internal/transport-certificates/${POD_NAME}.tls.key\n\tDISABLED_CERT_MARKER=/mnt/elastic-internal/transport-certificates/transport.certs.disabled\n\t# wait for the transport certificates to show up\n\techo \"waiting for the transport certificates (${INIT_CONTAINER_LOCAL_KEY_PATH} or ${DISABLED_CERT_MARKER})\"\n\twait_start=$(date +%s)\n\twhile [ ! -f ${INIT_CONTAINER_LOCAL_KEY_PATH} ] \u0026\u0026 [ ! -f ${DISABLED_CERT_MARKER} ]\n\tdo\n\t\tsleep 0.2\n\tdone\n\techo \"wait duration: $(duration wait_start) sec.\"\n\tif [ -f ${DISABLED_CERT_MARKER} ]; then\n\t\techo \"Skipped transport certificate check because of .spec.transport.tls.selfSignedCerts.disabled\"\n\tfi\n\n\n\t######################\n\t#         End        #\n\t######################\n\techo \"Init script successful\"\n\techo \"Script duration: $(duration $script_start) sec.\"\n\n","readiness-port-script.sh":"#!/usr/bin/env bash\nif ! nc -z -v -w5 127.0.0.1 8080 \u003e/dev/null 2\u003e\u00261; then\n    echo \"Elasticsearch is not ready yet. Check the server logs.\"\n    exit 1\nfi\n","readiness-probe-script.sh":"#!/usr/bin/env bash\n\n# fail should be called as a last resort to help the user to understand why the probe failed\nfunction fail {\n  timestamp=$(date --iso-8601=seconds)\n  echo \"{\\\"timestamp\\\": \\\"${timestamp}\\\", \\\"message\\\": \\\"readiness probe failed\\\", \"$1\"}\" | tee /proc/1/fd/2 2\u003e /dev/null\n  exit 1\n}\n\nlabels=\"/mnt/elastic-internal/downward-api/labels\"\n\nversion=\"\"\nif [[ -f \"${labels}\" ]]; then\n  # get Elasticsearch version from the downward API\n  version=$(grep \"elasticsearch.k8s.elastic.co/version\" ${labels} | cut -d '=' -f 2)\n  # remove quotes\n  version=$(echo \"${version}\" | tr -d '\"')\nfi\n\nREADINESS_PROBE_TIMEOUT=${READINESS_PROBE_TIMEOUT:=3}\n\n# Check if PROBE_PASSWORD_PATH is set, otherwise fall back to its former name in 1.0.0.beta-1: PROBE_PASSWORD_FILE\nif [[ -z \"${PROBE_PASSWORD_PATH}\" ]]; then\n  probe_password_path=\"${PROBE_PASSWORD_FILE}\"\nelse\n  probe_password_path=\"${PROBE_PASSWORD_PATH}\"\nfi\n\n# setup basic auth if credentials are available\nif [ -n \"${PROBE_USERNAME}\" ] \u0026\u0026 [ -f \"${probe_password_path}\" ]; then\n  PROBE_PASSWORD=$(\u003c${probe_password_path})\n  BASIC_AUTH=\"-u ${PROBE_USERNAME}:${PROBE_PASSWORD}\"\nelse\n  BASIC_AUTH=''\nfi\n\n# Check if we are using IPv6\nif [[ $POD_IP =~ .*:.* ]]; then\n  LOOPBACK=\"[::1]\"\nelse \n  LOOPBACK=127.0.0.1\nfi\n\n# request Elasticsearch on /\n# we are turning globbing off to allow for unescaped [] in case of IPv6\nENDPOINT=\"${READINESS_PROBE_PROTOCOL:-https}://${LOOPBACK}:9200/\"\nORIGIN_HEADER=\"x-elastic-product-origin: cloud\"\nstatus=$(curl -o /dev/null -w \"%{http_code}\" --max-time ${READINESS_PROBE_TIMEOUT} -H \"${ORIGIN_HEADER}\" -XGET -g -s -k ${BASIC_AUTH} $ENDPOINT)\ncurl_rc=$?\n\nif [[ ${curl_rc} -ne 0 ]]; then\n  fail \"\\\"curl_rc\\\": \\\"${curl_rc}\\\"\"\nfi\n\n# ready if status code 200, 503 is tolerable if ES version is 6.x\nif [[ ${status} == \"200\" ]] || [[ ${status} == \"503\" \u0026\u0026 ${version:0:2} == \"6.\" ]]; then\n  exit 0\nelse\n  fail \" \\\"status\\\": \\\"${status}\\\", \\\"version\\\":\\\"${version}\\\" \"\nfi\n","suspend.sh":"#!/usr/bin/env bash\nset -eu\n\nwhile [[ $(grep -Exc $HOSTNAME /mnt/elastic-internal/scripts/suspended_pods.txt) -eq 1 ]]; do\necho Pod suspended via eck.k8s.elastic.co/suspend annotation\nsleep 10\ndone\n","suspended_pods.txt":""},"kind":"ConfigMap","metadata":{"annotations":{"argocd.argoproj.io/tracking-id":"observability:/ConfigMap:observability/logging-es-scripts"},"creationTimestamp":"2026-02-13T19:05:28Z","labels":{"common.k8s.elastic.co/type":"elasticsearch","elasticsearch.k8s.elastic.co/cluster-name":"logging"},"name":"logging-es-scripts","namespace":"observability","ownerReferences":[{"apiVersion":"elasticsearch.k8s.elastic.co/v1","blockOwnerDeletion":true,"controller":true,"kind":"Elasticsearch","name":"logging","uid":"1c4aeb4c-afb2-4714-b3b0-d1d756f53bdc"}],"resourceVersion":"2112766","uid":"3bfd16d8-2abe-46d6-ba1c-96271173b171"}}
