  \u003c/p\u003e\n        \u003c/div\u003e\n    \u003c/header\u003e\n\n    \u003cdiv class=\"contact-grid\"\u003e\n        \u003cdiv class=\"contact-node\"\u003e\n            \u003cdiv class=\"contact-icon\"\u003e\u003ci class=\"fas fa-map-marker-alt\"\u003e\u003c/i\u003e\u003c/div\u003e\n            \u003cdiv\u003eRIYADH, SAUDI ARABIA\u003c/div\u003e\n        \u003c/div\u003e\n        \u003cdiv class=\"contact-node\"\u003e\n            \u003cdiv class=\"contact-icon\"\u003e\u003ci class=\"fas fa-phone\"\u003e\u003c/i\u003e\u003c/div\u003e\n            \u003cdiv\u003e+966 54 770 7138\u003c/div\u003e\n        \u003c/div\u003e\n        \u003cdiv class=\"contact-node\"\u003e\n            \u003cdiv class=\"contact-icon\"\u003e\u003ci class=\"fas fa-envelope\"\u003e\u003c/i\u003e\u003c/div\u003e\n            \u003cdiv\u003eabu7midan@gmail.com\u003c/div\u003e\n            \u003ca href=\"mailto:abu7midan@gmail.com\"\u003eSEND ENCRYPTED MESSAGE\u003c/a\u003e\n        \u003c/div\u003e\n    \u003c/div\u003e\n\n    \u003cnav class=\"nav-terminal\"\u003e\n        \u003ca href=\"#dossier\" class=\"nav-button\"\u003e\n            \u003ci class=\"fas fa-file-contract\"\u003e\u003c/i\u003e DOSSIER\n        \u003c/a\u003e\n        \u003ca href=\"#skills\" class=\"nav-button\"\u003e\n            \u003ci class=\"fas fa-microchip\"\u003e\u003c/i\u003e CAPABILITIES MATRIX\n        \u003c/a\u003e\n        \u003ca href=\"#operations\" class=\"nav-button\"\u003e\n            \u003ci class=\"fas fa-briefcase\"\u003e\u003c/i\u003e FIELD OPERATIONS\n        \u003c/a\u003e\n        \u003ca href=\"#projects\" class=\"nav-button\"\u003e\n            \u003ci class=\"fas fa-project-diagram\"\u003e\u003c/i\u003e BLACK OPS PROJECTS\n        \u003c/a\u003e\n        \u003ca href=\"https://github.com/abu7midan?tab=repositories\" target=\"_blank\" class=\"nav-button warning\"\u003e\n            \u003ci class=\"fab fa-github\"\u003e\u003c/i\u003e GITHUB REPOSITORIES\n        \u003c/a\u003e\n        \u003ca href=\"https://www.linkedin.com/in/abu7midan/\" target=\"_blank\" class=\"nav-button\"\u003e\n            \u003ci class=\"fab fa-linkedin\"\u003e\u003c/i\u003e LINKEDIN PROFILE\n        \u003c/a\u003e\n        \u003ca href=\"https://rancher.abu7midan.com:30443\" target=\"_blank\" class=\"nav-button critical\"\u003e\n            \u003ci class=\"fas fa-server\"\u003e\u003c/i\u003e RANCHER DASHBOARD\n        \u003c/a\u003e\n        \u003ca href=\"#monitoring\" class=\"nav-button warning\"\u003e\n            \u003ci class=\"fas fa-chart-line\"\u003e\u003c/i\u003e MONITORING (COMING SOON)\n        \u003c/a\u003e\n    \u003c/nav\u003e\n\n    \u003csection class=\"intel-section\" id=\"dossier\" data-section=\"DOSSIER\"\u003e\n        \u003ch2\u003eOPERATIVE PROFILE\u003c/h2\u003e\n        \u003cdiv class=\"command-line\" style=\"margin: 20px 0;\"\u003e\n            \u003cspan style=\"color: var(--primary);\"\u003eAnalyzing operative capabilities...\u003c/span\u003e\u003cbr\u003e\n            \u003cspan style=\"color: var(--terminal);\"\u003eResults-oriented Integration and Cloud Architect with 13+ years experience in enterprise-grade systems.\u003c/span\u003e\u003cbr\u003e\n            \u003cspan style=\"color: var(--secondary);\"\u003eSpecialization: API Management, Event-Driven Systems, Cloud-Native Architecture\u003c/span\u003e\n        \u003c/div\u003e\n        \u003cp style=\"margin: 20px 0; line-height: 1.8;\"\u003e\n            Expert in designing and deploying secure, scalable integration platforms across multi-cloud environments. \n            Proven track record in API governance, automation, observability, and DevOps transformations. \n            Specialist in high-availability systems, disaster recovery architecture, and SRE practices.\n        \u003c/p\u003e\n    \u003c/section\u003e\n\n    \u003csection class=\"intel-section\" id=\"skills\" data-section=\"CAPABILITIES\"\u003e\n        \u003ch2\u003eTECHNICAL CAPABILITIES MATRIX\u003c/h2\u003e\n        \u003cdiv class=\"skill-matrix\"\u003e\n            \u003cdiv class=\"skill-category\"\u003e\n                \u003ch3\u003e\u003ci class=\"fas fa-code\"\u003e\u003c/i\u003e LANGUAGES \u0026 FRAMEWORKS\u003c/h3\u003e\n                \u003cul class=\"skill-list\"\u003e\n                    \u003cli\u003eC# / .NET Core / ABP Framework\u003c/li\u003e\n                    \u003cli\u003ePython / TypeScript / Node.js\u003c/li\u003e\n                    \u003cli\u003eSQL / NoSQL Databases\u003c/li\u003e\n                    \u003cli\u003eBash / PowerShell Automation\u003c/li\u003e\n                \u003c/ul\u003e\n            \u003c/div\u003e\n            \n            \u003cdiv class=\"skill-category\"\u003e\n                \u003ch3\u003e\u003ci class=\"fas fa-cloud\"\u003e\u003c/i\u003e CLOUD \u0026 INFRASTRUCTURE\u003c/h3\u003e\n                \u003cul class=\"skill-list\"\u003e\n                    \u003cli\u003eGoogle Cloud Platform (GCP)\u003c/li\u003e\n                    \u003cli\u003eMicrosoft Azure\u003c/li\u003e\n                    \u003cli\u003eKubernetes / Docker\u003c/li\u003e\n                    \u003cli\u003eTerraform / Helm / GitOps\u003c/li\u003e\n                \u003c/ul\u003e\n            \u003c/div\u003e\n            \n            \u003cdiv class=\"skill-category\"\u003e\n                \u003ch3\u003e\u003ci class=\"fas fa-network-wired\"\u003e\u003c/i\u003e API \u0026 INTEGRATION\u003c/h3\u003e\n                \u003cul class=\"skill-list\"\u003e\n                    \u003cli\u003eApigee (OPDK/Hybrid/SaaS)\u003c/li\u003e\n                    \u003cli\u003eWSO2 API Manager\u003c/li\u003e\n                    \u003cli\u003eKong Gateway\u003c/li\u003e\n                    \u003cli\u003eREST / GraphQL / SOAP\u003c/li\u003e\n                \u003c/ul\u003e\n            \u003c/div\u003e\n            \n            \u003cdiv class=\"skill-category\"\u003e\n                \u003ch3\u003e\u003ci class=\"fas fa-tachometer-alt\"\u003e\u003c/i\u003e DEVOPS \u0026 MONITORING\u003c/h3\u003e\n                \u003cul class=\"skill-list\"\u003e\n                    \u003cli\u003eGitHub Actions / Jenkins\u003c/li\u003e\n                    \u003cli\u003eArgo CD / Azure DevOps\u003c/li\u003e\n                    \u003cli\u003eElasticsearch / Zabbix\u003c/li\u003e\n                    \u003cli\u003eGrafana / Prometheus\u003c/li\u003e\n                \u003c/ul\u003e\n            \u003c/div\u003e\n        \u003c/div\u003e\n    \u003c/section\u003e\n\n    \u003csection class=\"intel-section\" id=\"operations\" data-section=\"FIELD OPERATIONS\"\u003e\n        \u003ch2\u003eFIELD OPERATIONS RECORD\u003c/h2\u003e\n        \n        \u003cdiv class=\"experience-log\"\u003e\n            \u003cdiv class=\"log-header\"\u003e\n                \u003cdiv class=\"log-title\"\u003eINTEGRATION / DEVOPS ENGINEER / TECHNICAL LEAD\u003c/div\u003e\n                \u003cdiv class=\"log-agency\"\u003eTHIQAH BUSINESS SERVICES\u003c/div\u003e\n                \u003cdiv class=\"log-duration\"\u003e2017–PRESENT\u003c/div\u003e\n            \u003c/div\u003e\n            \u003cul class=\"skill-list\"\u003e\n                \u003cli\u003eArchitected and deployed API gateways (Apigee, WSO2, Kong) for 200+ APIs\u003c/li\u003e\n                \u003cli\u003eIntegrated Elasticsearch, Zabbix, and Grafana for enterprise observability\u003c/li\u003e\n                \u003cli\u003eDesigned event-driven integration pipelines using Kafka and RabbitMQ\u003c/li\u003e\n                \u003cli\u003eBuilt CI/CD pipelines reducing deployment time by 60%\u003c/li\u003e\n                \u003cli\u003eEstablished SRE practices including SLIs/SLOs and automated alerts\u003c/li\u003e\n            \u003c/ul\u003e\n        \u003c/div\u003e\n        \n        \u003cdiv class=\"experience-log\"\u003e\n            \u003cdiv class=\"log-header\"\u003e\n                \u003cdiv class=\"log-title\"\u003eEPM SPECIALIST / SENIOR FULL‑STACK DEVELOPER\u003c/div\u003e\n                \u003cdiv class=\"log-agency\"\u003eMETHOD CORP\u003c/div\u003e\n                \u003cdiv class=\"log-duration\"\u003e2016–2017\u003c/div\u003e\n            \u003c/div\u003e\n            \u003cul class=\"skill-list\"\u003e\n                \u003cli\u003eBuilt and administered Microsoft Project Server \u0026 SharePoint solutions\u003c/li\u003e\n                \u003cli\u003eAutomated EPM workflows and dashboards with Power BI and SSRS\u003c/li\u003e\n            \u003c/ul\u003e\n        \u003c/div\u003e\n    \u003c/section\u003e\n\n    \u003csection class=\"intel-section\" id=\"projects\" data-section=\"BLACK OPS PROJECTS\"\u003e\n        \u003ch2\u003eCLASSIFIED PROJECT ARCHIVES\u003c/h2\u003e\n        \u003cdiv class=\"project-grid\"\u003e\n            \u003cdiv class=\"project-card\"\u003e\n                \u003cdiv class=\"codename\"\u003eOPERATION: DR-CLOUD\u003c/div\u003e\n                \u003ch3\u003eDisaster Recovery Platform\u003c/h3\u003e\n                \u003cp\u003eEnd-to-end Disaster Recovery for 16 critical applications using hybrid Active–Active architecture across GCP and local cloud infrastructure.\u003c/p\u003e\n            \u003c/div\u003e\n            \n            \u003cdiv class=\"project-card\"\u003e\n                \u003cdiv class=\"codename\"\u003eOPERATION: FINOPS-GUARDIAN\u003c/div\u003e\n                \u003ch3\u003eAI-Driven FinOps Platform\u003c/h3\u003e\n                \u003cp\u003eMachine Learning and rule-based models to analyze servers, applications, APIs, and human resources costs in hybrid environments.\u003c/p\u003e\n            \u003c/div\u003e\n            \n            \u003cdiv class=\"project-card\"\u003e\n                \u003cdiv class=\"codename\"\u003eOPERATION: WATHQ\u003c/div\u003e\n                \u003ch3\u003eNational API Platform\u003c/h3\u003e\n                \u003cp\u003eNational API subscription and identity verification platform enabling private-sector access to government services across Saudi Arabia.\u003c/p\u003e\n            \u003c/div\u003e\n            \n            \u003cdiv class=\"project-card\"\u003e\n                \u003cdiv class=\"codename\"\u003eOPERATION: HYBRID-GATEWAY\u003c/div\u003e\n                \u003ch3\u003eFederated API Gateway\u003c/h3\u003e\n                \u003cp\u003eArchitected federated Apigee, WSO2, and Kong gateway ecosystem providing unified API governance across hybrid environments.\u003c/p\u003e\n            \u003c/div\u003e\n        \u003c/div\u003e\n    \u003c/section\u003e\n\n    \u003cdiv class=\"status-terminal\"\u003e\n        \u003cdiv class=\"status-line online\"\u003e[✓] PORTFOLIO WEBSITE: OPERATIONAL\u003c/div\u003e\n        \u003cdiv class=\"status-line online\"\u003e[✓] KUBERNETES CLUSTER: ACTIVE\u003c/div\u003e\n        \u003cdiv class=\"status-line online\"\u003e[✓] RANCHER DASHBOARD: \u003ca href=\"https://rancher.abu7midan.com:30443\" target=\"_blank\" style=\"color: var(--primary); text-decoration: none;\"\u003eACCESS GRANTED\u003c/a\u003e\u003c/div\u003e\n        \u003cdiv class=\"status-line warning\"\u003e[!] MONITORING SYSTEM: DEPLOYMENT PENDING\u003c/div\u003e\n        \u003cdiv class=\"status-line online\"\u003e[✓] SECURE CONNECTION: ENCRYPTED\u003c/div\u003e\n        \u003cdiv class=\"status-line\"\u003e[\u003e] LAST UPDATE: JANUARY 2026\u003c/div\u003e\n    \u003c/div\u003e\n\n    \u003cfooter\u003e\n        \u003cdiv class=\"footer-links\"\u003e\n            \u003ca href=\"https://github.com/abu7midan?tab=repositories\" target=\"_blank\"\u003e\n                \u003ci class=\"fab fa-github\"\u003e\u003c/i\u003e GitHub Repositories\n            \u003c/a\u003e\n            \u003ca href=\"https://www.linkedin.com/in/abu7midan/\" target=\"_blank\"\u003e\n                \u003ci class=\"fab fa-linkedin\"\u003e\u003c/i\u003e LinkedIn Profile\n            \u003c/a\u003e\n            \u003ca href=\"https://medium.com/@abu7midan\" target=\"_blank\"\u003e\n                \u003ci class=\"fab fa-medium\"\u003e\u003c/i\u003e Technical Articles\n            \u003c/a\u003e\n            \u003ca href=\"mailto:abu7midan@gmail.com\"\u003e\n                \u003ci class=\"fas fa-envelope\"\u003e\u003c/i\u003e Encrypted Comms\n            \u003c/a\u003e\n        \u003c/div\u003e\n        \u003cp style=\"margin-top: 20px; color: var(--text-secondary); font-size: 0.8em;\"\u003e\n            \u003ci class=\"fas fa-shield-alt\"\u003e\u003c/i\u003e This dossier is protected by advanced encryption protocols\n        \u003c/p\u003e\n    \u003c/footer\u003e\n\n    \u003cscript\u003e\n        document.addEventListener('DOMContentLoaded', function() {\n            // Typewriter effect for command line\n            const lines = [\n                \"Initializing secure connection...\",\n                \"Establishing encrypted channel...\",\n                \"Connection established. Welcome, Director.\",\n                \"Accessing dossier: ABU7MIDAN_PROFILE\",\n                \"Decryption complete. Profile ready for review.\"\n            ];\n            \n            const commandLine = document.querySelector('.command-line');\n            let lineIndex = 0;\n            let charIndex = 0;\n            let currentLine = '';\n            \n            function typeWriter() {\n                if (lineIndex \u003c lines.length) {\n                    if (charIndex \u003c lines[lineIndex].length) {\n                        currentLine += lines[lineIndex].charAt(charIndex);\n                        commandLine.innerHTML = currentLine + '\u003cspan class=\"blinking-cursor\"\u003e\u003c/span\u003e';\n                        charIndex++;\n                        setTimeout(typeWriter, 50);\n                    } else {\n                        currentLine += '\u003cbr\u003e';\n                        lineIndex++;\n                        charIndex = 0;\n                        setTimeout(typeWriter, 500);\n                    }\n                }\n            }\n            \n            setTimeout(typeWriter, 1000);\n            \n            // Smooth scrolling\n            document.querySelectorAll('.nav-button[href^=\"#\"]').forEach(anchor =\u003e {\n                anchor.addEventListener('click', function(e) {\n                    if(this.getAttribute('href') !== '#monitoring') {\n                        e.preventDefault();\n                        const targetId = this.getAttribute('href');\n                        const targetElement = document.querySelector(targetId);\n                        if(targetElement) {\n                            targetElement.scrollIntoView({\n                                behavior: 'smooth',\n                                block: 'start'\n                            });\n                        }\n                    }\n                });\n            });\n            \n            // Matrix background effect\n            const matrix = document.querySelector('.matrix-background');\n            let angle = 0;\n            setInterval(() =\u003e {\n                angle = (angle + 0.5) % 360;\n                matrix.style.background = `repeating-linear-gradient(\n                    ${angle}deg,\n                    transparent,\n                    transparent 2px,\n                    var(--primary) 2px,\n                    var(--primary) 4px\n                )`;\n            }, 50);\n            \n            // Status terminal updates\n            const statusLines = document.querySelectorAll('.status-line');\n            statusLines.forEach((line, index) =\u003e {\n                setTimeout(() =\u003e {\n                    line.style.opacity = '0';\n                    setTimeout(() =\u003e {\n                        line.style.opacity = '1';\n                        line.style.transition = 'opacity 0.5s';\n                    }, 100);\n                }, index * 3000);\n            });\n            \n            // Add glitch effects randomly\n            setInterval(() =\u003e {\n                const elements = document.querySelectorAll('.glitch, .nav-button, h2');\n                const randomElement = elements[Math.floor(Math.random() * elements.length)];\n                randomElement.style.animation = 'none';\n                setTimeout(() =\u003e {\n                    randomElement.style.animation = '';\n                }, 100);\n            }, 3000);\n        });\n    \u003c/script\u003e\n\u003c/body\u003e\n\u003c/html\u003e\n"},"kind":"ConfigMap","metadata":{"annotations":{},"labels":{"app":"abu7midan-website","component":"config"},"name":"abu7midan-website-config","namespace":"abu7midan-website"}}
